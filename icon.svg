<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Gradient background with rounded corners -->
  <rect width="512" height="512" fill="url(#grad)" rx="100"/>

  <g transform="translate(256, 256)">
    <!-- Dumbbell icon with better styling -->
    <g fill="white" opacity="1">
      <!-- Left weight -->
      <rect x="-140" y="-60" width="40" height="120" rx="8"/>
      <rect x="-155" y="-40" width="15" height="80" rx="6"/>

      <!-- Right weight -->
      <rect x="100" y="-60" width="40" height="120" rx="8"/>
      <rect x="140" y="-40" width="15" height="80" rx="6"/>

      <!-- Bar connecting weights -->
      <rect x="-100" y="-15" width="200" height="30" rx="15"/>
    </g>

    <!-- 3x5 text -->
    <text x="0" y="165" font-family="Inter, Arial, sans-serif" font-size="90" font-weight="900" fill="white" text-anchor="middle">3×5</text>
  </g>
</svg>
