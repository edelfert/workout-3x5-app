<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /**
         * Workout Tracker (single-file)
         * ---------------------------------
         * - Built with React (UMD) + Babel-in-browser.
         * - Persists workout history + settings in localStorage.
         * - Session model:
         *     {
         *       date: ISO string,
         *       type: 'A' | 'B',
         *       didRunning: boolean, // optional tag for the same day
         *       exercises: [{ name, sets: [{ weight, reps }] }]
         *     }
         * - UI flow: Splash (if already completed today) → Warmup → Workout → Commit to history.
         */

        // Simple SVG Icons
        const Calendar = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const TrendingUp = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Dumbbell = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14.4 14.4L9.6 9.6"></path>
                <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"></path>
            </svg>
        );

        const Timer = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="14" r="8"></circle>
                <line x1="12" y1="14" x2="15" y2="11"></line>
            </svg>
        );

        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const Settings = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        function WorkoutTracker() {
            // -------- Persistent state (stored in localStorage) --------
            const [workouts, setWorkouts] = useState(() => {
                try {
                    const saved = localStorage.getItem('workoutHistory');
                    if (!saved) return [];
                    const parsed = JSON.parse(saved);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (e) {
                    console.warn('Failed to parse workoutHistory from localStorage', e);
                    return [];
                }
            });

            const [setCount, setSetCount] = useState(() => {
                const saved = localStorage.getItem('setCount');
                const parsed = saved ? parseInt(saved, 10) : 3;
                return Number.isFinite(parsed) ? parsed : 3;
            });

            const [currentSession, setCurrentSession] = useState(null);

            const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
            const [sets, setSets] = useState(() =>
                Array(setCount).fill(null).map(() => ({ weight: '', reps: '' }))
            );
            const [warmupChecklist, setWarmupChecklist] = useState([
                { id: 1, text: '5 minutes light cardio', done: false },
                { id: 2, text: '10 arm circles forward', done: false },
                { id: 3, text: '10 arm circles backward', done: false },
                { id: 4, text: '10 bodyweight squats', done: false },
                { id: 5, text: '5 push-ups', done: false },
                { id: 6, text: '1 light set of each exercise', done: false }
            ]);
            const [timerActive, setTimerActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(120);
            // -------- UI state (not persisted) --------
            const [showHistory, setShowHistory] = useState(false);
            const [showBackupReminder, setShowBackupReminder] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
             const [showEditWorkout, setShowEditWorkout] = useState(false);
             const [editWorkoutIndex, setEditWorkoutIndex] = useState(null);
             const [editDraft, setEditDraft] = useState(null);
            const [manualWorkoutOverride, setManualWorkoutOverride] = useState(null);
            const [autoFillWeights, setAutoFillWeights] = useState(() => {
                const saved = localStorage.getItem('autoFillWeights');
                return saved === 'true';
            });
            const [failureTracker, setFailureTracker] = useState(() => {
                try {
                    const saved = localStorage.getItem('failureTracker');
                    const parsed = saved ? JSON.parse(saved) : {};
                    return (parsed && typeof parsed === 'object') ? parsed : {};
                } catch (e) {
                    console.warn('Failed to parse failureTracker from localStorage', e);
                    return {};
                }
            });

            const [showWarmup, setShowWarmup] = useState(() => {
                try {
                    const saved = localStorage.getItem('workoutHistory');
                    const history = saved ? JSON.parse(saved) : [];
                    if (!Array.isArray(history) || history.length === 0) return true;

                    // Use latest workout by date (defensive in case history isn't sorted)
                    const latest = history.reduce((acc, w) => {
                        try {
                            return new Date(w.date) > new Date(acc.date) ? w : acc;
                        } catch {
                            return acc;
                        }
                    }, history[0]);

                    const lastWorkoutDate = new Date(latest.date);
                    const today = new Date();
                    const completedToday = (
                        lastWorkoutDate.getDate() === today.getDate() &&
                        lastWorkoutDate.getMonth() === today.getMonth() &&
                        lastWorkoutDate.getFullYear() === today.getFullYear()
                    );

                    return !completedToday;
                } catch (e) {
                    console.warn('Failed to compute warmup state from localStorage', e);
                    return true;
                }
            });

                        // Tag for the current session (set in Warmup / adjustable during workout)
            const [didRunningToday, setDidRunningToday] = useState(false);

// Persist workout history any time it changes
            useEffect(() => {
                localStorage.setItem('workoutHistory', JSON.stringify(workouts));
            }, [workouts]);

            useEffect(() => {
                localStorage.setItem('setCount', setCount.toString());
                // Reset sets array when setCount changes
                setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
            }, [setCount]);

            // Persist auto-fill preference
            useEffect(() => {
                localStorage.setItem('autoFillWeights', autoFillWeights.toString());
            }, [autoFillWeights]);

            // Persist "consecutive failure" counts per exercise
            useEffect(() => {
                localStorage.setItem('failureTracker', JSON.stringify(failureTracker));
            }, [failureTracker]);

            useEffect(() => {
                const lastBackup = localStorage.getItem('lastBackupDate');
                const now = new Date();

                if (!lastBackup) {
                    localStorage.setItem('lastBackupDate', now.toISOString());
                } else {
                    const lastBackupDate = new Date(lastBackup);
                    const daysSinceBackup = (now - lastBackupDate) / (1000 * 60 * 60 * 24);

                    if (daysSinceBackup >= 7 && workouts.length > 0) {
                        setShowBackupReminder(true);
                    }
                }
            }, [workouts]);

            useEffect(() => {
                let interval;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(time => time - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            // Workout templates (simple A/B split)
            const workoutA = [
                { name: 'Goblet Squat', target: 5 },
                { name: 'Dumbbell Bench Press', target: 5 },
                { name: 'Dumbbell Row', target: 5 }
            ];

            const workoutB = [
                { name: 'Dumbbell Romanian Deadlift', target: 5 },
                { name: 'Dumbbell Overhead Press', target: 5 },
                { name: 'Dumbbell Row', target: 5 }
            ];

            // Safe number parsing: returns null instead of NaN
            const safeInt = (value) => {
                const n = parseInt(value, 10);
                return Number.isFinite(n) ? n : null;
            };

            // Parse common true/false-ish values (used for CSV import)
            const parseBool = (value) => {
                const s = String(value ?? '').trim().toLowerCase();
                return ['1', 'true', 'yes', 'y', 't'].includes(s);
            };

            // Escape values for CSV output (quotes/commas/newlines)
            const csvEscape = (val) => {
                const s = String(val ?? '');
                return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
            };

            // Minimal CSV line parser that supports quoted fields and escaped quotes ("")
            const parseCSVLine = (line) => {
                const out = [];
                let cur = '';
                let inQuotes = false;

                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];

                    if (inQuotes) {
                        if (ch === '"') {
                            if (line[i + 1] === '"') {
                                cur += '"';
                                i++;
                            } else {
                                inQuotes = false;
                            }
                        } else {
                            cur += ch;
                        }
                    } else {
                        if (ch === '"') {
                            inQuotes = true;
                        } else if (ch === ',') {
                            out.push(cur);
                            cur = '';
                        } else {
                            cur += ch;
                        }
                    }
                }
                out.push(cur);
                return out;
            };

            const getLatestWorkoutFromList = (list) => {
                if (!Array.isArray(list) || list.length === 0) return null;
                return list.reduce((latest, w) => {
                    try {
                        return new Date(w.date) > new Date(latest.date) ? w : latest;
                    } catch {
                        return latest;
                    }
                }, list[0]);
            };


            // Returns the index of the newest workout by date (defensive in case array isn't sorted)
            const getLatestWorkoutIndexFromList = (list) => {
                if (!Array.isArray(list) || list.length === 0) return null;
                let latestIdx = 0;
                for (let i = 1; i < list.length; i++) {
                    try {
                        if (new Date(list[i].date) > new Date(list[latestIdx].date)) latestIdx = i;
                    } catch {
                        // ignore bad dates
                    }
                }
                return latestIdx;
            };

            /**
             * Recompute consecutive failures per exercise from the full workout history.
             * This keeps weight suggestions sane if you edit a workout after the fact.
             *
             * "Success" here means: all recorded sets have reps >= 5 (we ignore empty sets).
             * If an exercise has zero recorded sets, we skip it for failure tracking.
             */
            const recomputeFailureTrackerFromWorkouts = (list) => {
                const tracker = {};
                if (!Array.isArray(list) || list.length === 0) return tracker;

                // Work through history chronologically by date
                const ordered = list
                    .slice()
                    .sort((a, b) => {
                        try { return new Date(a.date) - new Date(b.date); } catch { return 0; }
                    });

                for (const w of ordered) {
                    if (!w || !Array.isArray(w.exercises)) continue;
                    for (const ex of w.exercises) {
                        if (!ex || !ex.name) continue;
                        const setsArr = Array.isArray(ex.sets) ? ex.sets : [];
                        const filled = setsArr.filter(s => s && s.reps !== '' && s.reps !== null && s.reps !== undefined);
                        if (filled.length === 0) continue;

                        const success = filled.every(s => {
                            const reps = parseInt(s.reps, 10);
                            return Number.isFinite(reps) && reps >= 5;
                        });

                        if (success) tracker[ex.name] = 0;
                        else tracker[ex.name] = (tracker[ex.name] || 0) + 1;
                    }
                }
                return tracker;
            };


            const startTimer = () => {
                setTimeLeft(120);
                setTimerActive(true);
            };

            const stopTimer = () => {
                setTimerActive(false);
                setTimeLeft(120);
            };

            const toggleWarmupItem = (id) => {
                setWarmupChecklist(prev => prev.map(item =>
                    item.id === id ? { ...item, done: !item.done } : item
                ));
            };

            // Warmup → Workout: start a new in-progress session
            const finishWarmup = () => {
                const selectedWorkout = getCurrentWorkout(); // respects manual override
                // Create a new in-progress session; we only add it to history once the workout is completed
                setCurrentSession({
                    date: new Date().toISOString(),
                    type: selectedWorkout.type,
                    didRunning: didRunningToday,
                    exercises: []
                });
                setCurrentExerciseIndex(0);
                setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                setShowWarmup(false);
                setManualWorkoutOverride(null);
            };

            // Export the workout history to CSV (one row per set)
            const exportToCSV = () => {
                const headers = ['DateTime', 'Workout Type', 'Did Running', 'Exercise', 'Set Number', 'Weight (lbs)', 'Reps'];
                const rows = [headers];

                workouts.forEach(workout => {
                    const date = workout.date; // ISO datetime
                    workout.exercises.forEach(exercise => {
                        exercise.sets.forEach((set, setIdx) => {
                            rows.push([
                                date,
                                workout.type,
                                workout.didRunning ? 'Yes' : 'No',
                                exercise.name,
                                setIdx + 1,
                                set.weight,
                                set.reps
                            ]);
                        });
                    });
                });

                const csvContent = rows.map(row => row.map(csvEscape).join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `workout-history-${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                URL.revokeObjectURL(url);

                localStorage.setItem('lastBackupDate', new Date().toISOString());
                setShowBackupReminder(false);
            };

            // Import CSV (one row per set). We de-dupe by day + workout type.
            const importFromCSV = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const text = e.target.result ?? '';
                        const lines = String(text).split(/\r?\n/).filter(line => line.trim());

                        if (lines.length < 2) {
                            alert('CSV has no data rows.');
                            return;
                        }

                        const header = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase());
                        const getIdx = (candidates, fallback) => {
                            for (const c of candidates) {
                                const i = header.indexOf(c);
                                if (i >= 0) return i;
                            }
                            return fallback;
                        };

                        const iDate = getIdx(['datetime', 'datetime (iso)', 'date', 'date/time'], 0);
                        const iType = getIdx(['workout type', 'type'], 1);
                        const iExercise = getIdx(['exercise', 'exercise name'], 2);
                        const iSet = getIdx(['set number', 'set', 'set #'], 3);
                        const iWeight = getIdx(['weight (lbs)', 'weight'], 4);
                        const iReps = getIdx(['reps', 'repetitions'], 5);
                        const iRunning = getIdx(['did running', 'running', 'ran'], -1);


                        const workoutMap = {};

                        for (const line of lines.slice(1)) {
                            const values = parseCSVLine(line);
                            if (!values.length) continue;

                            const dateRaw = (values[iDate] ?? '').trim();
                            const workoutType = (values[iType] ?? '').trim();
                            const exerciseName = (values[iExercise] ?? '').trim();
                            const setNumRaw = (values[iSet] ?? '').trim();
                            const weight = (values[iWeight] ?? '').trim();
                            const reps = (values[iReps] ?? '').trim();

                            const didRunning = iRunning >= 0 ? parseBool(values[iRunning]) : false;

                            if (!dateRaw || !workoutType || !exerciseName) continue;

                            const parsedDate = new Date(dateRaw);
                            if (Number.isNaN(parsedDate.getTime())) continue;

                            const dateIso = parsedDate.toISOString();
                            const key = `${dateIso}-${workoutType}`;

                            if (!workoutMap[key]) {
                                workoutMap[key] = {
                                    date: dateIso,
                                    type: workoutType,
                                    didRunning,
                                    exercises: []
                                };
                            } else if (didRunning) {
                                // Some CSV exporters repeat the workout-level fields per row; keep it true if any row says true
                                workoutMap[key].didRunning = true;
                            }

                            let exercise = workoutMap[key].exercises.find(ex => ex.name === exerciseName);
                            if (!exercise) {
                                exercise = {
                                    name: exerciseName,
                                    sets: []
                                };
                                workoutMap[key].exercises.push(exercise);
                            }

                            const setIndexParsed = safeInt(setNumRaw);
                            const setIndex = (setIndexParsed !== null) ? (setIndexParsed - 1) : exercise.sets.length;

                            if (setIndex >= 0) {
                                exercise.sets[setIndex] = { weight, reps };
                            }
                        }

                        const importedWorkouts = Object.values(workoutMap)
                            .map(w => ({
                                ...w,
                                exercises: w.exercises.map(ex => ({
                                    ...ex,
                                    sets: ex.sets.filter(Boolean)
                                }))
                            }))
                            .sort((a, b) => new Date(a.date) - new Date(b.date));

                        const makeDayKey = (dateIso, type) => `${new Date(dateIso).toISOString().split('T')[0]}-${type}`;
                        const existingKeys = new Set(workouts.map(w => makeDayKey(w.date, w.type)));

                        const newWorkouts = importedWorkouts.filter(w => !existingKeys.has(makeDayKey(w.date, w.type)));

                        if (newWorkouts.length > 0) {
                            const merged = [...workouts, ...newWorkouts].sort((a, b) =>
                                new Date(a.date) - new Date(b.date)
                            );
                            setWorkouts(merged);
                            alert(`Successfully imported ${newWorkouts.length} workout(s)!`);
                        } else {
                            alert('No new workouts to import.');
                        }
                    } catch (error) {
                        console.error(error);
                        alert('Error importing CSV. Please check the file format.');
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const getCurrentWorkout = () => {
                // Check for manual override first
                if (manualWorkoutOverride) {
                    return manualWorkoutOverride === 'A'
                        ? { type: 'A', exercises: workoutA }
                        : { type: 'B', exercises: workoutB };
                }

                const lastWorkout = getLatestWorkoutFromList(workouts);
                if (!lastWorkout) return { type: 'A', exercises: workoutA };
                return lastWorkout.type === 'A'
                    ? { type: 'B', exercises: workoutB }
                    : { type: 'A', exercises: workoutA };
            };

            const nextWorkout = getCurrentWorkout();
            const currentWorkout = currentSession
                ? {
                    type: currentSession.type,
                    exercises: currentSession.type === 'A' ? workoutA : workoutB
                  }
                : nextWorkout;
            const currentExercise = currentWorkout.exercises[currentExerciseIndex];

            // Auto-fill weights when exercise changes if preference is enabled
            // FIX: Added workouts and failureTracker to dependency array to prevent stale closures
            useEffect(() => {
                if (autoFillWeights && currentExercise) {
                    const lastSession = workouts
                        .filter(w => w.exercises.some(e => e.name === currentExercise.name))
                        .pop();

                    if (lastSession) {
                        const exercise = lastSession.exercises.find(e => e.name === currentExercise.name);
                        if (exercise) {
                            const failures = failureTracker[currentExercise.name] || 0;

                            const lastWeight = safeInt(exercise.sets?.[0]?.weight);
                            if (lastWeight === null) return; // Don't prefill if we don't have a usable last weight

                            const enoughSets = Array.isArray(exercise.sets) && exercise.sets.length >= setCount;
                            const hitTargets = enoughSets && exercise.sets.slice(0, setCount).every(s => {
                                const r = safeInt(s.reps);
                                return r !== null && r >= currentExercise.target;
                            });

                            let suggestedWeight;
                            if (failures >= 3) {
                                // Deload by 10%
                                suggestedWeight = Math.round(lastWeight * 0.9).toString();
                            } else {
                                suggestedWeight = hitTargets
                                    ? (lastWeight + 5).toString()
                                    : String(exercise.sets?.[0]?.weight ?? lastWeight);
                            }

                            const suggestedReps = currentExercise.target.toString();

                            setSets(Array(setCount).fill(null).map(() => ({
                                weight: suggestedWeight,
                                reps: suggestedReps
                            })));
                        }
                    }
                }
            }, [currentExerciseIndex, autoFillWeights, currentExercise?.name, setCount, workouts, failureTracker]);

            const getSuggestedWeight = (exerciseName) => {
                // FIX: Guard against undefined currentExercise
                if (!currentExercise) return 'Start light';

                const lastSession = workouts
                    .filter(w => w.exercises.some(e => e.name === exerciseName))
                    .pop();

                if (!lastSession) return 'Start light';

                const exercise = lastSession.exercises.find(e => e.name === exerciseName);
                if (!exercise) return 'Start light';

                const lastWeight = safeInt(exercise.sets?.[0]?.weight);
                if (lastWeight === null) return 'Start light';

                // Check if we need to deload (3 consecutive failures)
                const failures = failureTracker[exerciseName] || 0;
                if (failures >= 3) {
                    const deloadWeight = Math.round(lastWeight * 0.9);
                    return `${deloadWeight} lbs (DELOAD -10%)`;
                }

                const enoughSets = Array.isArray(exercise.sets) && exercise.sets.length >= setCount;
                const hitTargets = enoughSets && exercise.sets.slice(0, setCount).every(s => {
                    const r = safeInt(s.reps);
                    return r !== null && r >= currentExercise.target;
                });

                if (hitTargets) {
                    return `${lastWeight + 5} lbs (up 5!)`;
                }

                return `${exercise.sets?.[0]?.weight ?? lastWeight} lbs (same)`;
            };

            const handleSetChange = (index, field, value) => {
                setSets(prev => prev.map((s, i) => (
                    i === index ? { ...s, [field]: value } : s
                )));
            };

            // Save the current exercise into the in-progress session.
            // If this was the last exercise, commit the session into workout history.
            const completeExercise = () => {
                const filledSets = sets.filter(s =>
                    String(s.weight ?? '').trim() !== '' && String(s.reps ?? '').trim() !== ''
                );

                const exerciseData = {
                    name: currentExercise.name,
                    sets: filledSets
                };

                // Check if ALL configured sets hit target reps
                const allSetsComplete =
                    filledSets.length === setCount &&
                    filledSets.every(s => {
                        const r = safeInt(s.reps);
                        return r !== null && r >= currentExercise.target;
                    });

                // Update failure tracker
                const newFailureTracker = { ...failureTracker };
                if (allSetsComplete) {
                    // Success - reset failure counter
                    newFailureTracker[currentExercise.name] = 0;
                } else {
                    // Failed - increment failure counter
                    newFailureTracker[currentExercise.name] = (newFailureTracker[currentExercise.name] || 0) + 1;
                }
                setFailureTracker(newFailureTracker);

                // Build/update the in-progress session (prevents overwriting older history)
                // Use the in-progress session if we have one; otherwise create a defensive fallback session
                const baseSession = currentSession || {
                    date: new Date().toISOString(),
                    type: currentWorkout.type,
                    didRunning: didRunningToday,
                    exercises: []
                };

                const updatedSession = {
                    ...baseSession,
                    exercises: [...(baseSession.exercises || []), exerciseData]
                };

                if (currentExerciseIndex < currentWorkout.exercises.length - 1) {
                    setCurrentSession(updatedSession);
                    setCurrentExerciseIndex(currentExerciseIndex + 1);
                    setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                    startTimer();
                } else {
                    // Workout complete — commit session to history
                    setWorkouts(prev => [...prev, updatedSession]);
                    setCurrentSession(null);
                    setDidRunningToday(false);

                    setCurrentExerciseIndex(0);
                    setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                    setShowWarmup(false); // Don't show warmup - let splash screen show instead
                    setWarmupChecklist(items => items.map(item => ({ ...item, done: false })));
                    setManualWorkoutOverride(null); // Reset override after workout complete
                }
            };

            const getLastPerformance = (exerciseName) => {
                // Find the newest workout (by date) that includes this exercise
                const candidates = workouts.filter(w => Array.isArray(w.exercises) && w.exercises.some(e => e.name === exerciseName));
                if (candidates.length === 0) return null;

                const latest = getLatestWorkoutFromList(candidates);
                if (!latest) return null;

                return (latest.exercises || []).find(e => e.name === exerciseName) || null;
            };

            const lastPerformance = getLastPerformance(currentExercise?.name);

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // Returns true if the newest saved workout happened today (used for the rest-day splash screen)
            const hasCompletedWorkoutToday = () => {
                if (workouts.length === 0) return false;

                const lastWorkout = getLatestWorkoutFromList(workouts);
                if (!lastWorkout) return false;
                const lastWorkoutDate = new Date(lastWorkout.date);
                const today = new Date();

                return (
                    lastWorkoutDate.getDate() === today.getDate() &&
                    lastWorkoutDate.getMonth() === today.getMonth() &&
                    lastWorkoutDate.getFullYear() === today.getFullYear()
                );
            };

            const getNextWorkoutDay = () => {
                const today = new Date();
                const dayOfWeek = today.getDay(); // 0 = Sunday, 1 = Monday, etc.

                // Workout days: Sunday (0), Tuesday (2), Friday (5)
                const workoutDays = [0, 2, 5];

                // Find next workout day
                for (let i = 1; i <= 7; i++) {
                    const nextDay = new Date(today);
                    nextDay.setDate(today.getDate() + i);
                    if (workoutDays.includes(nextDay.getDay())) {
                        return nextDay.toLocaleDateString('en-US', {
                            weekday: 'long',
                            month: 'long',
                            day: 'numeric'
                        });
                    }
                }
                return 'Soon';
            };

            // Workout Complete Splash Screen

            // ----- Post-workout editing -----
            // Lets you tweak the most recent workout (weights/reps/type/running) after you finish.
            const beginEditWorkoutAtIndex = (idx) => {
                if (idx === null || idx === undefined) return;
                const w = workouts[idx];
                if (!w) return;

                setEditWorkoutIndex(idx);
                // Deep-clone so edits don't mutate the live history until you hit "Save"
                setEditDraft(JSON.parse(JSON.stringify(w)));
                setShowEditWorkout(true);

                // Keep other overlays closed
                setShowHistory(false);
                setShowSettings(false);
            };

            const beginEditLatestWorkout = () => {
                const idx = getLatestWorkoutIndexFromList(workouts);
                if (idx === null) return;
                beginEditWorkoutAtIndex(idx);
            };

            const cancelEditWorkout = () => {
                setShowEditWorkout(false);
                setEditWorkoutIndex(null);
                setEditDraft(null);
            };

            const updateEditDraftMeta = (field, value) => {
                setEditDraft(prev => {
                    if (!prev) return prev;
                    return { ...prev, [field]: value };
                });
            };

            const updateEditDraftSet = (exerciseIdx, setIdx, field, value) => {
                setEditDraft(prev => {
                    if (!prev) return prev;
                    const exercises = Array.isArray(prev.exercises) ? prev.exercises.slice() : [];
                    if (!exercises[exerciseIdx]) return prev;

                    const ex = { ...exercises[exerciseIdx] };
                    const setsArr = Array.isArray(ex.sets) ? ex.sets.slice() : [];
                    if (!setsArr[setIdx]) setsArr[setIdx] = { weight: '', reps: '' };

                    setsArr[setIdx] = { ...setsArr[setIdx], [field]: value };
                    ex.sets = setsArr;
                    exercises[exerciseIdx] = ex;
                    return { ...prev, exercises };
                });
            };

            const saveEditedWorkout = () => {
                if (editWorkoutIndex === null || editWorkoutIndex === undefined || !editDraft) return;

                // Commit edited workout to history and recompute failure tracker for clean suggestions
                setWorkouts(prev => {
                    const updated = prev.map((w, i) => (i === editWorkoutIndex ? editDraft : w));
                    setFailureTracker(recomputeFailureTrackerFromWorkouts(updated));
                    return updated;
                });

                cancelEditWorkout();
            };

            // Edit screen (rendered as its own full-screen view)
            if (showEditWorkout && editDraft) {
                const prettyDate = (() => {
                    try {
                        return new Date(editDraft.date).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                    } catch {
                        return 'Unknown date';
                    }
                })();

                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4">
                        <div className="max-w-3xl mx-auto">
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <div className="flex items-center justify-between mb-6">
                                    <h1 className="text-3xl font-bold text-white">Edit Workout</h1>
                                    <button
                                        onClick={cancelEditWorkout}
                                        className="text-blue-400 hover:text-blue-300 font-semibold text-sm"
                                    >
                                        ← Back
                                    </button>
                                </div>

                                <div className="bg-slate-700 rounded-lg p-4 mb-6">
                                    <div className="text-slate-300 text-sm mb-3">
                                        <span className="text-slate-400">Date:</span> {prettyDate}
                                    </div>

                                    <div className="flex flex-col md:flex-row gap-4">
                                        <div className="flex-1">
                                            <label className="block text-sm text-slate-300 mb-1 font-semibold">Workout Type</label>
                                            <div className="flex gap-2">
                                                <button
                                                    onClick={() => updateEditDraftMeta('type', 'A')}
                                                    className={`flex-1 py-2 rounded font-semibold transition-colors ${
                                                        editDraft.type === 'A' ? 'bg-blue-500 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-600'
                                                    }`}
                                                >
                                                    A
                                                </button>
                                                <button
                                                    onClick={() => updateEditDraftMeta('type', 'B')}
                                                    className={`flex-1 py-2 rounded font-semibold transition-colors ${
                                                        editDraft.type === 'B' ? 'bg-blue-500 text-white' : 'bg-slate-800 text-slate-300 hover:bg-slate-600'
                                                    }`}
                                                >
                                                    B
                                                </button>
                                            </div>
                                        </div>

                                        <div className="flex-1">

                                            <label className="flex items-center gap-3 text-slate-200 cursor-pointer select-none bg-slate-800 rounded-lg p-3">

                                                    type="checkbox"
                                                    className="w-4 h-4"
                                                    checked={!!editDraft.didRunning}
                                                    onChange={(e) => updateEditDraftMeta('didRunning', e.target.checked)}
                                                />

                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    {(editDraft.exercises || []).map((ex, exIdx) => (
                                        <div key={exIdx} className="bg-slate-700 rounded-lg p-5">

                                            <div className="overflow-x-auto">
                                                <table className="w-full text-sm">
                                                    <thead>
                                                        <tr className="text-slate-300">
                                                            <th className="text-left py-2 pr-2">Set</th>
                                                            <th className="text-left py-2 pr-2">Weight</th>
                                                            <th className="text-left py-2 pr-2">Reps</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {(ex.sets || []).map((s, setIdx) => (
                                                            <tr key={setIdx} className="border-t border-slate-600">
                                                                <td className="py-2 pr-2 text-slate-300 font-semibold">{setIdx + 1}</td>
                                                                <td className="py-2 pr-2">
                                                                    <input
                                                                        type="number"
                                                                        inputMode="numeric"
                                                                        className="w-28 bg-slate-800 text-white px-3 py-2 rounded border border-slate-600 focus:outline-none focus:border-blue-500"
                                                                        value={s?.weight ?? ''}
                                                                        onChange={(e) => updateEditDraftSet(exIdx, setIdx, 'weight', e.target.value)}
                                                                        placeholder="lbs"
                                                                    />
                                                                </td>
                                                                <td className="py-2 pr-2">
                                                                    <input
                                                                        type="number"
                                                                        inputMode="numeric"
                                                                        className="w-20 bg-slate-800 text-white px-3 py-2 rounded border border-slate-600 focus:outline-none focus:border-blue-500"
                                                                        value={s?.reps ?? ''}
                                                                        onChange={(e) => updateEditDraftSet(exIdx, setIdx, 'reps', e.target.value)}
                                                                        placeholder="reps"
                                                                    />
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>

                                            <div className="text-xs text-slate-400 mt-3">
                                                Tip: edits affect future suggestions (we recompute failure tracking on save).
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex flex-col md:flex-row gap-3 mt-6">
                                    <button
                                        onClick={saveEditedWorkout}
                                        className="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors"
                                    >
                                        Save Changes
                                    </button>
                                    <button
                                        onClick={cancelEditWorkout}
                                        className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-lg transition-colors"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

if (hasCompletedWorkoutToday() && !showHistory && !showSettings && !showWarmup && !currentSession) {
                const lastWorkout = getLatestWorkoutFromList(workouts);

                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4 flex items-center justify-center">
                        <div className="max-w-2xl w-full">
                            <div className="bg-slate-800 rounded-lg p-8 border border-slate-700 text-center">
                                <div className="mb-6">
                                    <div className="inline-flex items-center justify-center w-20 h-20 bg-green-500 rounded-full mb-4">
                                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3">
                                            <polyline points="20 6 9 17 4 12"></polyline>
                                        </svg>
                                    </div>
                                    <h1 className="text-4xl font-bold text-white mb-2">
                                        Workout Complete!
                                    </h1>
                                    <p className="text-slate-400 text-lg">
                                        You finished Workout {lastWorkout?.type ?? '?'} today
                                    </p>
                                </div>

                                <div className="bg-slate-700 rounded-lg p-6 mb-6">
                                    <h3 className="text-white font-semibold mb-4">Today's Summary</h3>
                                    <div className="space-y-2">
                                        {(lastWorkout?.exercises || []).map((ex, i) => (
                                            <div key={i} className="flex justify-between text-sm">
                                                <span className="text-slate-300">{ex.name}</span>
                                                <span className="text-blue-400 font-semibold">
                                                    {/* FIX: Added optional chaining to prevent crash on empty sets */}
                                                    {ex.sets?.[0]?.weight ?? '?'} lbs × {ex.sets?.length ?? 0} sets
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-blue-900/30 border border-blue-500 rounded-lg p-4 mb-6">
                                    <p className="text-blue-300 text-sm">
                                        <strong className="text-white">Next Workout:</strong> {getNextWorkoutDay()}
                                    </p>
                                    <p className="text-blue-300 text-sm mt-1">
                                        You'll be doing Workout {lastWorkout?.type === 'A' ? 'B' : 'A'}
                                    </p>
                                </div>


                                <div className="flex flex-col md:flex-row gap-3">
                                    <button
                                        onClick={() => setShowHistory(true)}
                                        className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-lg transition-colors"
                                    >
                                        View History
                                    </button>
                                    <button
                                        onClick={beginEditLatestWorkout}
                                        className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors"
                                    >
                                        Edit Today's Workout
                                    </button>
                                    <button
                                        onClick={exportToCSV}
                                        className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition-colors"
                                    >
                                        Backup Data
                                    </button>
                                </div>


                                <button
                                    onClick={() => {
                                        if (confirm('Are you sure you want to do another workout today? This will override your rest day.')) {
                                            setDidRunningToday(false);
                                            setShowWarmup(true);
                                        }
                                    }}
                                    className="w-full mt-3 text-slate-400 hover:text-slate-300 text-sm underline"
                                >
                                    Do another workout anyway
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (showWarmup) {
                const allWarmupDone = warmupChecklist.every(item => item.done);

                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4">
                        <div className="max-w-2xl mx-auto">
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <div className="flex items-center justify-between mb-6">
                                    <h1 className="text-3xl font-bold text-white flex items-center gap-2">
                                        <Dumbbell />
                                        Warmup
                                    </h1>
                                    <div className="text-right">
                                        <div className="text-sm text-slate-400">Next Up</div>
                                        <div className="text-xl font-bold text-blue-400">
                                            Workout {currentWorkout.type}
                                        </div>
                                    </div>
                                </div>

                                <div className="mb-4">
                                    <div className="text-slate-300 text-sm mb-2">Switch workout:</div>
                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => setManualWorkoutOverride('A')}
                                            className={`flex-1 py-2 rounded font-semibold transition-colors ${
                                                currentWorkout.type === 'A'
                                                    ? 'bg-blue-500 text-white'
                                                    : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                            }`}
                                        >
                                            Workout A
                                        </button>
                                        <button
                                            onClick={() => setManualWorkoutOverride('B')}
                                            className={`flex-1 py-2 rounded font-semibold transition-colors ${
                                                currentWorkout.type === 'B'
                                                    ? 'bg-blue-500 text-white'
                                                    : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                            }`}
                                        >
                                            Workout B
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-slate-700 rounded-lg p-4 mb-6">
                                    <label className="flex items-center gap-3 text-slate-200 cursor-pointer select-none">
                                        <input
                                            type="checkbox"
                                            className="w-4 h-4"
                                            checked={didRunningToday}
                                            onChange={(e) => setDidRunningToday(e.target.checked)}
                                        />
                                        <span className="font-semibold">I also ran today</span>
                                    </label>
                                    <div className="text-xs text-slate-400 mt-1">Optional tag — helps you remember days you doubled up.</div>
                                </div>

                                <div className="space-y-3 mb-6">
                                    {warmupChecklist.map(item => (
                                        <div
                                            key={item.id}
                                            onClick={() => toggleWarmupItem(item.id)}
                                            className={`p-4 rounded-lg cursor-pointer transition-all ${
                                                item.done
                                                    ? 'bg-green-900/30 border-2 border-green-500'
                                                    : 'bg-slate-700 border-2 border-slate-600'
                                            }`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <CheckCircle
                                                    className={item.done ? 'text-green-400' : 'text-slate-500'}
                                                    size={24}
                                                />
                                                <span className={`${item.done ? 'text-green-300 line-through' : 'text-white'}`}>
                                                    {item.text}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    onClick={finishWarmup}
                                    disabled={!allWarmupDone}
                                    className="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-bold py-4 rounded-lg transition-colors"
                                >
                                    {allWarmupDone ? 'Start Workout' : 'Complete warmup first'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4">
                    <div className="max-w-2xl mx-auto">
                        <div className="bg-slate-800 rounded-lg p-6 mb-6 border border-slate-700">
                            <div className="flex items-center justify-between mb-4">
                                <h1 className="text-3xl font-bold text-white flex items-center gap-2">
                                    <Dumbbell />
                                    Workout Tracker
                                </h1>
                                <div className="flex items-center gap-4">
                                    <button
                                        onClick={() => {
                                            setShowSettings(!showSettings);
                                            setShowHistory(false);
                                        }}
                                        className="text-slate-400 hover:text-slate-300"
                                    >
                                        <Settings size={20} />
                                    </button>
                                    <button
                                        onClick={() => {
                                            setShowHistory(!showHistory);
                                            setShowSettings(false);
                                        }}
                                        className="text-blue-400 hover:text-blue-300 font-semibold text-sm underline"
                                    >
                                        {showHistory ? 'Current' : 'History'}
                                    </button>
                                    <div className="text-right">
                                        <div className="text-sm text-slate-400">Today</div>
                                        <div className="text-2xl font-bold text-blue-400">
                                            Workout {currentWorkout.type}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2 text-slate-300">
                                    <Calendar size={16} />
                                    <span>{new Date().toLocaleDateString('en-US', {
                                        weekday: 'long',
                                        month: 'long',
                                        day: 'numeric'
                                    })}</span>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={exportToCSV}
                                        disabled={workouts.length === 0}
                                        className="bg-green-600 hover:bg-green-700 disabled:bg-slate-600 text-white px-3 py-1 rounded text-sm font-semibold"
                                    >
                                        Export
                                    </button>
                                    <label className="bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded text-sm font-semibold cursor-pointer">
                                        Import
                                        <input type="file" accept=".csv" onChange={importFromCSV} className="hidden" />
                                    </label>
                                </div>
                            </div>
                        </div>

                        {showBackupReminder && (
                            <div className="bg-yellow-600 rounded-lg p-4 mb-6">
                                <div className="flex items-center justify-between">
                                    <div className="text-white font-bold">Time to backup!</div>
                                    <div className="flex gap-2">
                                        <button onClick={exportToCSV} className="bg-white text-yellow-700 px-3 py-1 rounded font-semibold">
                                            Backup Now
                                        </button>
                                        <button
                                            onClick={() => {
                                                localStorage.setItem('lastBackupDate', new Date().toISOString());
                                                setShowBackupReminder(false);
                                            }}
                                            className="bg-yellow-700 text-white px-3 py-1 rounded font-semibold"
                                        >
                                            Later
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showSettings ? (
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <h2 className="text-2xl font-bold text-white mb-6">Settings</h2>

                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-white font-semibold mb-3">
                                            Sets Per Exercise
                                        </label>
                                        <div className="flex gap-4">
                                            <button
                                                onClick={() => setSetCount(3)}
                                                className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${
                                                    setCount === 3
                                                        ? 'bg-blue-500 text-white'
                                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                                }`}
                                            >
                                                3 Sets (3x5)
                                            </button>
                                            <button
                                                onClick={() => setSetCount(5)}
                                                className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${
                                                    setCount === 5
                                                        ? 'bg-blue-500 text-white'
                                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'

                                            >
