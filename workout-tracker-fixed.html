                                                        <span className={`font-semibold ${
                                                            failures >= 3 ? 'text-orange-400' :
                                                            failures > 0 ? 'text-yellow-400' : 'text-green-400'
                                                        }`}>
                                                            {failures >= 3 ? '⚠️ Deload needed' :
                                                             failures > 0 ? `${failures} failure${failures > 1 ? 's' : ''}` :
                                                             '✓ On track'}
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        ) : (
                                            <p className="text-slate-400 text-sm">No exercises tracked yet</p>
                                        )}
                                    </div>

                                    <div className="border-t border-slate-700 pt-6">
                                        <h3 className="text-white font-semibold mb-3">Data Management</h3>
                                        <button
                                            onClick={() => {
                                                if (confirm('This will delete ALL workout history. Are you sure?')) {
                                                    localStorage.removeItem('workoutHistory');
                                                    localStorage.removeItem('lastBackupDate');
                                                    setWorkouts([]);
                                                    setCurrentSession(null);
                                                    setDidRunningToday(false);
                                                    alert('All data cleared!');
                                                }
                                            }}
                                            className="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg"
                                        >
                                            Clear All Data
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : showHistory ? (
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-2xl font-bold text-white">History</h2>
                                    <button
                                        onClick={() => {
                                            setShowHistory(false);
                                            setShowSettings(false);
                                        }}
                                        className="text-blue-400 hover:text-blue-300 font-semibold text-sm"
                                    >
                                        ← Back
                                    </button>
                                </div>

                                {workouts.length === 0 ? (
                                    <div className="text-center text-slate-400 py-8">
                                        No workouts yet!
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {/* FIX: Use workout.date as key instead of reversed index */}
                                        {workouts.slice().reverse().map((workout) => (
                                            <div key={workout.date} className="bg-slate-700 rounded-lg p-5">
                                                <div className="flex justify-between mb-4 pb-3 border-b border-slate-600">
                                                    <div>
                                                        <div className="text-xl font-bold text-white">
                                                            Workout {workout.type}
                                                        </div>
                                                        <div className="text-sm text-slate-400">
                                                            {new Date(workout.date).toLocaleDateString('en-US', {
                                                                weekday: 'long',
                                                                month: 'long',
                                                                day: 'numeric'
                                                            })}
                                                        </div>
                                                        {workout.didRunning && (
                                                            <div className="mt-1 text-xs text-slate-300">🏃 Ran today</div>
                                                        )}
                                                    </div>
                                                </div>

                                                <div className="space-y-4">
                                                    {workout.exercises.map((ex, i) => (
                                                        <div key={i} className="bg-slate-600 rounded p-4">
                                                            <div className="font-semibold text-white mb-2">
                                                                {ex.name}
                                                            </div>
                                                            <div className="grid grid-cols-3 gap-2">
                                                                {ex.sets.map((set, setIdx) => (
                                                                    <div key={setIdx} className="bg-slate-700 rounded p-2 text-center">
                                                                        <div className="text-xs text-slate-400">Set {setIdx + 1}</div>
                                                                        <div className="text-white font-bold">{set.weight} lbs</div>
                                                                        <div className="text-blue-400 text-sm">{set.reps} reps</div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <div className="mb-6">
                                    <div className="flex items-center justify-between mb-2">
                                        <h2 className="text-2xl font-bold text-white">
                                            {currentExercise?.name ?? 'Exercise'}
                                        </h2>
                                        <span className="text-slate-400 text-sm">
                                            {currentExerciseIndex + 1} of {currentWorkout.exercises.length}
                                        </span>
                                    </div>
                                    <div className="text-blue-400 font-semibold">
                                        Target: {setCount} × {currentExercise?.target ?? 5} reps
                                    </div>
                                </div>

                                {/* Optional cardio tag for this day */}
                                <div className="mb-6">
                                    <label className="flex items-center gap-3 text-slate-300 cursor-pointer select-none">
                                        <input
                                            type="checkbox"
                                            className="w-4 h-4"
                                            checked={Boolean((currentSession?.didRunning) ?? didRunningToday)}
                                            onChange={(e) => {
                                                const checked = e.target.checked;
                                                setDidRunningToday(checked);
                                                setCurrentSession(prev => prev ? ({ ...prev, didRunning: checked }) : prev);
                                            }}
                                        />
                                        <span>Also did running today</span>
                                    </label>
                                    <div className="text-xs text-slate-500 mt-1">Saved with this workout and included in CSV export.</div>
                                </div>

                                {currentExercise && failureTracker[currentExercise.name] >= 3 && (
                                    <div className="bg-orange-600 rounded-lg p-4 mb-6 border border-orange-500">
                                        <div className="flex items-center gap-2 mb-1">
                                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                                                <line x1="12" y1="9" x2="12" y2="13"></line>
                                                <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                            </svg>
                                            <span className="text-white font-bold">Deload Time!</span>
                                        </div>
                                        <p className="text-orange-100 text-sm">
                                            You've failed this exercise 3 times in a row. Time to reduce weight by 10% and rebuild strength.
                                        </p>
                                    </div>
                                )}

                                <div className="bg-slate-700 rounded-lg p-4 mb-6">
                                    <div className="flex items-center gap-2 mb-2">
                                        <TrendingUp size={20} />
                                        <span className="text-white font-semibold">Suggested</span>
                                    </div>
                                    <div className="text-2xl font-bold text-green-400">
                                        {currentExercise ? getSuggestedWeight(currentExercise.name) : 'Start light'}
                                    </div>
                                    {lastPerformance && lastPerformance.sets?.[0] && (
                                        <div className="mt-2 text-sm text-slate-400">
                                            {/* FIX: Added optional chaining for lastPerformance.sets[0] */}
                                            Last: {lastPerformance.sets?.[0]?.weight ?? '?'} lbs × {
                                                lastPerformance.sets.map(s => s.reps).join(', ')
                                            }
                                        </div>
                                    )}
                                </div>

                                <div className="bg-slate-700 rounded-lg p-4 mb-6">
                                    <div className="flex items-center justify-between mb-3">
                                        <div className="flex items-center gap-2">
                                            <Timer size={20} />
                                            <span className="text-white font-semibold">Rest</span>
                                        </div>
                                        <div className={`text-3xl font-bold ${timeLeft <= 10 && timerActive ? 'text-red-400' : 'text-blue-400'}`}>
                                            {formatTime(timeLeft)}
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button
                                            onClick={startTimer}
                                            disabled={timerActive}
                                            className="flex-1 bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 text-white font-semibold py-2 rounded"
                                        >
                                            Start
                                        </button>
                                        <button
                                            onClick={stopTimer}
                                            className="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 rounded"
                                        >
                                            Reset
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-4 mb-6">
                                    {sets.map((set, index) => (
                                        <div key={index} className="bg-slate-700 rounded-lg p-4">
                                            <div className="text-white font-semibold mb-3">
                                                Set {index + 1}
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-slate-300 text-sm mb-2">
                                                        Weight (lbs)
                                                    </label>
                                                    <input
                                                        type="number"
                                                        value={set.weight}
                                                        onChange={(e) => handleSetChange(index, 'weight', e.target.value)}
                                                        className="w-full bg-slate-600 text-white rounded px-4 py-2"
                                                        placeholder="30"
                                                    />
                                                </div>
                                                <div>
                                                    <label className="block text-slate-300 text-sm mb-2">
                                                        Reps
                                                    </label>
                                                    <input
                                                        type="number"
                                                        value={set.reps}
                                                        onChange={(e) => handleSetChange(index, 'reps', e.target.value)}
                                                        className="w-full bg-slate-600 text-white rounded px-4 py-2"
                                                        placeholder="5"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    onClick={completeExercise}
                                    disabled={!sets.some(s => s.weight && s.reps)}
                                    className="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 text-white font-bold py-4 rounded-lg"
                                >
                                    {currentExerciseIndex < currentWorkout.exercises.length - 1
                                        ? 'Next Exercise'
                                        : 'Complete Workout'}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<WorkoutTracker />, document.getElementById('root'));
    </script>
</body>
</html>
