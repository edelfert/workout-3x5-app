<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>3x5 Workout Tracker</title>
    <link rel="manifest" href="./manifest.json">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * {
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            overscroll-behavior: none;
            touch-action: pan-x pan-y;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Glassmorphism styles */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .glass-button {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.8) 0%, rgba(139, 92, 246, 0.8) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }

        .glass-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6);
        }

        .glass-button:active {
            transform: translateY(0);
        }

        .glass-success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.8) 0%, rgba(5, 150, 105, 0.8) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .glass-success:hover {
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.6);
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .gradient-text {
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Smooth transitions */
        * {
            transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // SVG Icons
        const Calendar = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const TrendingUp = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Dumbbell = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14.4 14.4L9.6 9.6"></path>
                <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"></path>
            </svg>
        );

        const Timer = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="14" r="8"></circle>
                <line x1="12" y1="14" x2="15" y2="11"></line>
            </svg>
        );

        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const Settings = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        const ChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        function WorkoutTracker() {
            // Persistent state
            const [workouts, setWorkouts] = useState(() => {
                try {
                    const saved = localStorage.getItem('workoutHistory');
                    return saved ? JSON.parse(saved) : [];
                } catch {
                    return [];
                }
            });

            const [setCount, setSetCount] = useState(() => {
                const saved = localStorage.getItem('setCount');
                return saved ? parseInt(saved) : 3;
            });

            const [startingWeights, setStartingWeights] = useState(() => {
                try {
                    const saved = localStorage.getItem('startingWeights');
                    return saved ? JSON.parse(saved) : {};
                } catch {
                    return {};
                }
            });

            const [hasCompletedOnboarding, setHasCompletedOnboarding] = useState(() => {
                return localStorage.getItem('hasCompletedOnboarding') === 'true';
            });

            // Session state
            const [currentSession, setCurrentSession] = useState(null);
            const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
            const [sets, setSets] = useState(() =>
                Array(setCount).fill(null).map(() => ({ weight: '', reps: '' }))
            );

            // Warmup state
            const [warmupChecklist, setWarmupChecklist] = useState([
                { id: 1, text: '5 minutes light cardio', done: false },
                { id: 2, text: '10 arm circles each way', done: false },
                { id: 3, text: '10 bodyweight squats', done: false },
                { id: 4, text: '5 push-ups', done: false },
                { id: 5, text: '1 light warmup set', done: false }
            ]);

            // Timer state
            const [timerActive, setTimerActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(180); // 3 minutes default

            // UI state
            const [showHistory, setShowHistory] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showWarmup, setShowWarmup] = useState(false);
            const [showOnboarding, setShowOnboarding] = useState(!hasCompletedOnboarding && workouts.length === 0);
            const [onboardingStep, setOnboardingStep] = useState(0);
            const [tempStartingWeights, setTempStartingWeights] = useState({});

            const [autoFillWeights, setAutoFillWeights] = useState(() => {
                const saved = localStorage.getItem('autoFillWeights');
                return saved === 'true';
            });

            const [failureTracker, setFailureTracker] = useState(() => {
                try {
                    const saved = localStorage.getItem('failureTracker');
                    return saved ? JSON.parse(saved) : {};
                } catch {
                    return {};
                }
            });

            // Workout templates
            const workoutA = [
                { name: 'Squat', target: 5, description: 'Barbell Back Squat or Goblet Squat' },
                { name: 'Bench Press', target: 5, description: 'Barbell or Dumbbell Bench Press' },
                { name: 'Barbell Row', target: 5, description: 'Bent Over Barbell Row' }
            ];

            const workoutB = [
                { name: 'Squat', target: 5, description: 'Barbell Back Squat or Goblet Squat' },
                { name: 'Overhead Press', target: 5, description: 'Barbell or Dumbbell Press' },
                { name: 'Deadlift', target: 5, description: 'Conventional Deadlift' }
            ];

            const allExercises = [
                ...new Set([...workoutA, ...workoutB].map(e => e.name))
            ].map(name => {
                const ex = [...workoutA, ...workoutB].find(e => e.name === name);
                return { ...ex };
            });

            // Persist data
            useEffect(() => {
                localStorage.setItem('workoutHistory', JSON.stringify(workouts));
            }, [workouts]);

            useEffect(() => {
                localStorage.setItem('setCount', setCount.toString());
                setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
            }, [setCount]);

            useEffect(() => {
                localStorage.setItem('autoFillWeights', autoFillWeights.toString());
            }, [autoFillWeights]);

            useEffect(() => {
                localStorage.setItem('failureTracker', JSON.stringify(failureTracker));
            }, [failureTracker]);

            useEffect(() => {
                localStorage.setItem('startingWeights', JSON.stringify(startingWeights));
            }, [startingWeights]);

            // Timer
            useEffect(() => {
                let interval;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(time => time - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                    // Play notification sound or vibrate
                    if (navigator.vibrate) {
                        navigator.vibrate([200, 100, 200]);
                    }
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const startTimer = () => {
                setTimeLeft(180);
                setTimerActive(true);
            };

            const stopTimer = () => {
                setTimerActive(false);
                setTimeLeft(180);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // Onboarding functions
            const completeOnboarding = () => {
                setStartingWeights(tempStartingWeights);
                setHasCompletedOnboarding(true);
                localStorage.setItem('hasCompletedOnboarding', 'true');
                setShowOnboarding(false);
                setShowWarmup(true);
            };

            // Workout logic
            const getCurrentWorkout = () => {
                if (workouts.length === 0) return { type: 'A', exercises: workoutA };
                const lastWorkout = workouts[workouts.length - 1];
                return lastWorkout.type === 'A'
                    ? { type: 'B', exercises: workoutB }
                    : { type: 'A', exercises: workoutA };
            };

            const getSuggestedWeight = (exerciseName) => {
                const lastSession = workouts
                    .filter(w => w.exercises?.some(e => e.name === exerciseName))
                    .pop();

                if (!lastSession) {
                    return startingWeights[exerciseName] ? `${startingWeights[exerciseName]} lbs (start)` : 'Set starting weight';
                }

                const exercise = lastSession.exercises?.find(e => e.name === exerciseName);
                if (!exercise || !exercise.sets || exercise.sets.length === 0) {
                    return startingWeights[exerciseName] ? `${startingWeights[exerciseName]} lbs (start)` : 'Set starting weight';
                }

                const failures = failureTracker[exerciseName] || 0;
                const lastWeight = parseInt(exercise.sets[0]?.weight) || parseInt(startingWeights[exerciseName]) || 45;

                if (failures >= 3) {
                    const deloadWeight = Math.round(lastWeight * 0.9);
                    return `${deloadWeight} lbs (DELOAD -10%)`;
                }

                const allSetsComplete = exercise.sets.length > 0 && exercise.sets.every(s =>
                    parseInt(s?.reps) >= 5
                );

                if (allSetsComplete) {
                    return `${lastWeight + 5} lbs (up 5!)`;
                } else {
                    return `${lastWeight} lbs (same)`;
                }
            };

            const hasCompletedWorkoutToday = () => {
                if (workouts.length === 0) return false;

                const lastWorkout = workouts[workouts.length - 1];
                const lastWorkoutDate = new Date(lastWorkout.date);
                const today = new Date();

                return (
                    lastWorkoutDate.getDate() === today.getDate() &&
                    lastWorkoutDate.getMonth() === today.getMonth() &&
                    lastWorkoutDate.getFullYear() === today.getFullYear()
                );
            };

            const completeExercise = () => {
                if (!currentExercise) {
                    console.error('No current exercise defined');
                    return;
                }

                const filledSets = sets.filter(s => s.weight && s.reps);
                const exerciseData = {
                    name: currentExercise.name,
                    sets: filledSets
                };

                const allSetsComplete = filledSets.length === setCount &&
                    filledSets.every(s => parseInt(s.reps) >= currentExercise.target);

                const newFailureTracker = { ...failureTracker };
                if (allSetsComplete) {
                    newFailureTracker[currentExercise.name] = 0;
                } else {
                    newFailureTracker[currentExercise.name] = (newFailureTracker[currentExercise.name] || 0) + 1;
                }
                setFailureTracker(newFailureTracker);

                const baseSession = currentSession || {
                    date: new Date().toISOString(),
                    type: currentWorkout.type,
                    exercises: []
                };

                const updatedSession = {
                    ...baseSession,
                    exercises: [...baseSession.exercises, exerciseData]
                };

                if (currentExerciseIndex < currentWorkout.exercises.length - 1) {
                    setCurrentSession(updatedSession);
                    setCurrentExerciseIndex(currentExerciseIndex + 1);
                    setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                    startTimer();
                } else {
                    setWorkouts(prev => [...prev, updatedSession]);
                    setCurrentSession(null);
                    setCurrentExerciseIndex(0);
                    setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                    setShowWarmup(false);
                    setWarmupChecklist(items => items.map(item => ({ ...item, done: false })));
                }
            };

            const finishWarmup = () => {
                const selectedWorkout = getCurrentWorkout();
                setCurrentSession({
                    date: new Date().toISOString(),
                    type: selectedWorkout.type,
                    exercises: []
                });
                setCurrentExerciseIndex(0);
                setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                setShowWarmup(false);
            };

            const toggleWarmupItem = (id) => {
                setWarmupChecklist(prev => prev.map(item =>
                    item.id === id ? { ...item, done: !item.done } : item
                ));
            };

            const handleSetChange = (index, field, value) => {
                setSets(prev => prev.map((s, i) => (
                    i === index ? { ...s, [field]: value } : s
                )));
            };

            const exportToCSV = () => {
                if (workouts.length === 0) {
                    alert('No workout data to export!');
                    return;
                }

                const headers = ['Date', 'Workout Type', 'Exercise', 'Set Number', 'Weight (lbs)', 'Reps'];
                const rows = [headers];

                workouts.forEach(workout => {
                    if (!workout || !workout.date || !workout.exercises) return;
                    const date = new Date(workout.date).toLocaleDateString('en-US');
                    workout.exercises.forEach(exercise => {
                        if (!exercise || !exercise.sets) return;
                        exercise.sets.forEach((set, setIdx) => {
                            if (!set) return;
                            rows.push([
                                date,
                                workout.type || 'Unknown',
                                exercise.name || 'Unknown',
                                setIdx + 1,
                                set.weight || '0',
                                set.reps || '0'
                            ]);
                        });
                    });
                });

                const csvContent = rows.map(row => row.join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `workout-history-${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                URL.revokeObjectURL(url);
            };

            const currentWorkout = currentSession
                ? {
                    type: currentSession.type,
                    exercises: currentSession.type === 'A' ? workoutA : workoutB
                  }
                : getCurrentWorkout();
            const currentExercise = currentWorkout.exercises[currentExerciseIndex];

            // Auto-fill weights
            useEffect(() => {
                if (autoFillWeights && currentExercise) {
                    const suggestion = getSuggestedWeight(currentExercise.name);
                    const weightMatch = suggestion.match(/^\d+/);
                    if (weightMatch) {
                        setSets(Array(setCount).fill(null).map(() => ({
                            weight: weightMatch[0],
                            reps: currentExercise.target.toString()
                        })));
                    }
                }
            }, [currentExerciseIndex, autoFillWeights, currentExercise?.name, setCount]);

            // ONBOARDING SCREEN
            if (showOnboarding) {
                if (onboardingStep === 0) {
                    return (
                        <div className="min-h-screen p-4 flex items-center justify-center" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                            <div className="max-w-md w-full">
                                <div className="glass-dark rounded-3xl p-8 animate-float">
                                    <div className="text-center mb-8">
                                        <div className="inline-flex items-center justify-center w-24 h-24 rounded-full mb-6 glass-button shadow-2xl">
                                            <Dumbbell size={56} />
                                        </div>
                                        <h1 className="text-5xl font-black mb-3" style={{background: 'linear-gradient(135deg, #fff 0%, #a5b4fc 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'}}>
                                            Welcome to 3x5
                                        </h1>
                                        <p className="text-blue-100 text-lg font-medium">
                                            Your strength training companion
                                        </p>
                                    </div>

                                    <div className="space-y-4 mb-8">
                                        <div className="flex items-start gap-4 glass p-4 rounded-2xl">
                                            <div className="flex-shrink-0 w-10 h-10 glass-success rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg">
                                                1
                                            </div>
                                            <div>
                                                <h3 className="text-white font-bold text-lg">Progressive Overload</h3>
                                                <p className="text-blue-100 text-sm">Add 5 lbs each successful workout</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-4 glass p-4 rounded-2xl">
                                            <div className="flex-shrink-0 w-10 h-10 glass-success rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg">
                                                2
                                            </div>
                                            <div>
                                                <h3 className="text-white font-bold text-lg">A/B Split Workouts</h3>
                                                <p className="text-blue-100 text-sm">Alternate between two full-body routines</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-4 glass p-4 rounded-2xl">
                                            <div className="flex-shrink-0 w-10 h-10 glass-success rounded-full flex items-center justify-center text-white font-bold text-lg shadow-lg">
                                                3
                                            </div>
                                            <div>
                                                <h3 className="text-white font-bold text-lg">Track Everything</h3>
                                                <p className="text-blue-100 text-sm">Log weights, reps, and view progress</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="glass rounded-2xl p-5 mb-6">
                                        <label className="block text-white font-bold mb-4 text-lg">
                                            Choose Your Program
                                        </label>
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => setSetCount(3)}
                                                className={`flex-1 py-4 rounded-xl font-bold transition-all ${
                                                    setCount === 3
                                                        ? 'glass-button text-white shadow-2xl scale-105'
                                                        : 'glass-input text-blue-100 hover:scale-105'
                                                }`}
                                            >
                                                3x5
                                                <div className="text-xs opacity-80 font-medium">3 sets × 5 reps</div>
                                            </button>
                                            <button
                                                onClick={() => setSetCount(5)}
                                                className={`flex-1 py-4 rounded-xl font-bold transition-all ${
                                                    setCount === 5
                                                        ? 'glass-button text-white shadow-2xl scale-105'
                                                        : 'glass-input text-blue-100 hover:scale-105'
                                                }`}
                                            >
                                                5x5
                                                <div className="text-xs opacity-80 font-medium">5 sets × 5 reps</div>
                                            </button>
                                        </div>
                                    </div>

                                    <button
                                        onClick={() => setOnboardingStep(1)}
                                        className="w-full glass-button text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-2 text-lg shadow-2xl"
                                    >
                                        Set Starting Weights
                                        <ChevronRight size={24} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                } else {
                    // Step 1: Set starting weights
                    return (
                        <div className="min-h-screen p-4" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                            <div className="max-w-md mx-auto pt-8">
                                <div className="glass-dark rounded-3xl p-6">
                                    <h2 className="text-3xl font-black text-white mb-2">
                                        Set Your Starting Weights
                                    </h2>
                                    <p className="text-blue-100 mb-6 font-medium">
                                        Start conservative. You'll progress 5 lbs per workout.
                                    </p>

                                    <div className="space-y-3 mb-6">
                                        {allExercises.map(ex => (
                                            <div key={ex.name} className="glass rounded-2xl p-4">
                                                <label className="block text-white font-bold mb-1 text-lg">
                                                    {ex.name}
                                                </label>
                                                <p className="text-blue-100 text-sm mb-3">{ex.description}</p>
                                                <div className="flex items-center gap-3">
                                                    <input
                                                        type="number"
                                                        inputMode="numeric"
                                                        value={tempStartingWeights[ex.name] || ''}
                                                        onChange={(e) => setTempStartingWeights(prev => ({
                                                            ...prev,
                                                            [ex.name]: e.target.value
                                                        }))}
                                                        className="flex-1 glass-input text-white text-xl font-bold rounded-xl px-4 py-4 focus:outline-none"
                                                        placeholder="0"
                                                    />
                                                    <span className="text-white font-bold text-lg">lbs</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="glass rounded-2xl p-4 mb-4" style={{background: 'rgba(59, 130, 246, 0.2)', border: '1px solid rgba(59, 130, 246, 0.3)'}}>
                                        <p className="text-blue-50 text-sm font-medium">
                                            💡 <strong>Tip:</strong> If you're new to lifting, start with the bar (45 lbs) for Squat/Bench/Deadlift and 20-25 lbs for Overhead Press and Rows.
                                        </p>
                                    </div>

                                    <div className="glass rounded-2xl p-4 mb-6">
                                        <div className="flex items-center justify-between mb-3">
                                            <span className="text-white font-bold">Progress</span>
                                            <span className="text-blue-200 font-black text-lg">
                                                {Object.keys(tempStartingWeights).filter(k => tempStartingWeights[k] && parseInt(tempStartingWeights[k]) > 0).length}/{allExercises.length}
                                            </span>
                                        </div>
                                        <div className="w-full glass-input rounded-full h-3 overflow-hidden">
                                            <div
                                                className="glass-button h-3 rounded-full transition-all duration-500"
                                                style={{
                                                    width: `${(Object.keys(tempStartingWeights).filter(k => tempStartingWeights[k] && parseInt(tempStartingWeights[k]) > 0).length / allExercises.length) * 100}%`
                                                }}
                                            ></div>
                                        </div>
                                    </div>

                                    <div className="flex gap-3">
                                        <button
                                            onClick={() => setOnboardingStep(0)}
                                            className="flex-1 glass-input text-white font-bold py-4 rounded-xl hover:scale-105"
                                        >
                                            Back
                                        </button>
                                        <button
                                            onClick={completeOnboarding}
                                            disabled={!allExercises.every(ex => tempStartingWeights[ex.name] && parseInt(tempStartingWeights[ex.name]) > 0)}
                                            className="flex-1 glass-button disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-2xl"
                                        >
                                            Start Training
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }
            }

            // WARMUP SCREEN
            if (showWarmup) {
                const allWarmupDone = warmupChecklist.every(item => item.done);

                return (
                    <div className="min-h-screen p-4 pt-8" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                        <div className="max-w-2xl mx-auto">
                            <div className="glass-dark rounded-3xl p-6">
                                <div className="flex items-center justify-between mb-8">
                                    <h1 className="text-4xl font-black text-white flex items-center gap-3">
                                        <Dumbbell size={40} />
                                        Warmup
                                    </h1>
                                    <div className="text-right">
                                        <div className="text-sm text-blue-200 font-medium">Next Up</div>
                                        <div className="text-2xl font-black text-white">
                                            Workout {currentWorkout.type}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-3 mb-6">
                                    {warmupChecklist.map(item => (
                                        <div
                                            key={item.id}
                                            onClick={() => toggleWarmupItem(item.id)}
                                            className={`p-5 rounded-2xl cursor-pointer transition-all ${
                                                item.done
                                                    ? 'glass-success scale-98'
                                                    : 'glass hover:scale-102'
                                            }`}
                                            style={{transform: item.done ? 'scale(0.98)' : 'scale(1)'}}
                                        >
                                            <div className="flex items-center gap-4">
                                                <CheckCircle
                                                    className={item.done ? 'text-white' : 'text-blue-200'}
                                                    size={28}
                                                />
                                                <span className={`text-lg font-semibold ${item.done ? 'text-white line-through' : 'text-white'}`}>
                                                    {item.text}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    onClick={finishWarmup}
                                    disabled={!allWarmupDone}
                                    className="w-full glass-button disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-5 rounded-2xl text-lg shadow-2xl"
                                >
                                    {allWarmupDone ? 'Start Workout 💪' : 'Complete warmup first'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // COMPLETION SCREEN
            if (hasCompletedWorkoutToday() && !showHistory && !showSettings && !currentSession) {
                const lastWorkout = workouts[workouts.length - 1];

                return (
                    <div className="min-h-screen p-4 flex items-center justify-center" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                        <div className="max-w-2xl w-full">
                            <div className="glass-dark rounded-3xl p-8 text-center">
                                <div className="mb-8">
                                    <div className="inline-flex items-center justify-center w-28 h-28 glass-success rounded-full mb-6 shadow-2xl animate-float">
                                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3">
                                            <polyline points="20 6 9 17 4 12"></polyline>
                                        </svg>
                                    </div>
                                    <h1 className="text-5xl font-black mb-3" style={{background: 'linear-gradient(135deg, #fff 0%, #a5b4fc 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'}}>
                                        Workout Complete!
                                    </h1>
                                    <p className="text-blue-100 text-xl font-medium">
                                        You finished Workout {lastWorkout.type} today
                                    </p>
                                </div>

                                <div className="glass rounded-2xl p-6 mb-6">
                                    <h3 className="text-white font-bold mb-4 text-lg">Today's Summary</h3>
                                    <div className="space-y-3">
                                        {lastWorkout.exercises?.map((ex, i) => (
                                            <div key={i} className="flex justify-between glass-input p-3 rounded-xl">
                                                <span className="text-white font-semibold">{ex.name}</span>
                                                <span className="text-blue-200 font-bold">
                                                    {ex.sets?.[0]?.weight || '?'} lbs × {ex.sets?.length || 0} sets
                                                </span>
                                            </div>
                                        )) || <p className="text-blue-100">No exercises recorded</p>}
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row gap-3">
                                    <button
                                        onClick={() => setShowHistory(true)}
                                        className="flex-1 glass-input hover:scale-105 text-white font-bold py-4 rounded-xl"
                                    >
                                        View History
                                    </button>
                                    <button
                                        onClick={exportToCSV}
                                        className="flex-1 glass-success hover:scale-105 text-white font-bold py-4 rounded-xl shadow-lg"
                                    >
                                        Export Data
                                    </button>
                                </div>

                                <button
                                    onClick={() => {
                                        if (confirm('Are you sure you want to do another workout today?')) {
                                            setShowWarmup(true);
                                        }
                                    }}
                                    className="w-full mt-4 text-blue-200 hover:text-white text-sm underline font-medium"
                                >
                                    Do another workout anyway
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // MAIN WORKOUT SCREEN
            if (currentSession) {
                return (
                    <div className="min-h-screen p-4 pt-8" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                        <div className="max-w-2xl mx-auto">
                            {/* Header */}
                            <div className="glass-dark rounded-2xl p-5 mb-4">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div className="text-blue-200 text-sm font-medium">Workout {currentWorkout.type}</div>
                                        <div className="text-white text-2xl font-black">
                                            {currentExercise.name}
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-blue-200 text-sm font-medium">Exercise</div>
                                        <div className="text-white text-2xl font-black">
                                            {currentExerciseIndex + 1}/{currentWorkout.exercises.length}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Suggested Weight */}
                            <div className="glass-dark rounded-2xl p-5 mb-4">
                                <div className="flex items-center gap-2 mb-2">
                                    <TrendingUp size={24} />
                                    <span className="text-white font-bold text-lg">Suggested Weight</span>
                                </div>
                                <div className="text-3xl font-black text-white">
                                    {getSuggestedWeight(currentExercise.name)}
                                </div>
                            </div>

                            {/* Deload Warning */}
                            {failureTracker[currentExercise.name] >= 3 && (
                                <div className="glass rounded-2xl p-5 mb-4" style={{background: 'rgba(251, 146, 60, 0.3)', border: '1px solid rgba(251, 146, 60, 0.5)'}}>
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className="text-white font-black text-lg">⚠️ Deload Time!</span>
                                    </div>
                                    <p className="text-orange-50 text-sm font-medium">
                                        Failed 3 times. Reduce weight by 10% and rebuild.
                                    </p>
                                </div>
                            )}

                            {/* Rest Timer */}
                            <div className="glass-dark rounded-2xl p-5 mb-4">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-3">
                                        <Timer size={24} />
                                        <span className="text-white font-bold text-lg">Rest Timer</span>
                                    </div>
                                    <div className={`text-4xl font-black ${timeLeft <= 10 && timerActive ? 'text-red-400' : 'text-white'}`}>
                                        {formatTime(timeLeft)}
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button
                                        onClick={startTimer}
                                        disabled={timerActive}
                                        className="flex-1 glass-button disabled:opacity-50 text-white font-bold py-3 rounded-xl shadow-lg"
                                    >
                                        Start
                                    </button>
                                    <button
                                        onClick={stopTimer}
                                        className="flex-1 glass-input text-white font-bold py-3 rounded-xl hover:scale-105"
                                        style={{background: 'rgba(239, 68, 68, 0.3)', border: '1px solid rgba(239, 68, 68, 0.5)'}}
                                    >
                                        Reset
                                    </button>
                                </div>
                            </div>

                            {/* Sets */}
                            <div className="space-y-3 mb-4">
                                {sets.map((set, index) => (
                                    <div key={index} className="glass-dark rounded-2xl p-5">
                                        <div className="text-white font-black mb-4 text-lg">
                                            Set {index + 1}
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="block text-blue-200 text-sm mb-2 font-bold">
                                                    Weight (lbs)
                                                </label>
                                                <input
                                                    type="number"
                                                    inputMode="numeric"
                                                    value={set.weight}
                                                    onChange={(e) => handleSetChange(index, 'weight', e.target.value)}
                                                    className="w-full glass-input text-white text-2xl font-bold rounded-xl px-4 py-4 focus:outline-none"
                                                    placeholder="0"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-blue-200 text-sm mb-2 font-bold">
                                                    Reps
                                                </label>
                                                <input
                                                    type="number"
                                                    inputMode="numeric"
                                                    value={set.reps}
                                                    onChange={(e) => handleSetChange(index, 'reps', e.target.value)}
                                                    className="w-full glass-input text-white text-2xl font-bold rounded-xl px-4 py-4 focus:outline-none"
                                                    placeholder="5"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <button
                                onClick={completeExercise}
                                disabled={!sets.some(s => s.weight && s.reps)}
                                className="w-full glass-button disabled:opacity-50 text-white font-black py-5 rounded-2xl text-xl shadow-2xl"
                            >
                                {currentExerciseIndex < currentWorkout.exercises.length - 1
                                    ? 'Next Exercise →'
                                    : 'Complete Workout ✓'}
                            </button>
                        </div>
                    </div>
                );
            }

            // HOME/DASHBOARD SCREEN
            return (
                <div className="min-h-screen p-4 pt-8" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                    <div className="max-w-2xl mx-auto">
                        {/* Header */}
                        <div className="glass-dark rounded-3xl p-6 mb-6">
                            <div className="flex items-center justify-between mb-4">
                                <h1 className="text-4xl font-black text-white flex items-center gap-3">
                                    <Dumbbell size={40} />
                                    3x5 Tracker
                                </h1>
                                <button
                                    onClick={() => setShowSettings(!showSettings)}
                                    className="glass-input p-3 rounded-xl text-blue-200 hover:text-white hover:scale-110"
                                >
                                    <Settings size={28} />
                                </button>
                            </div>
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2 text-blue-100 font-medium">
                                    <Calendar size={18} />
                                    <span className="text-sm">{new Date().toLocaleDateString('en-US', {
                                        weekday: 'long',
                                        month: 'long',
                                        day: 'numeric'
                                    })}</span>
                                </div>
                                <button
                                    onClick={() => setShowHistory(!showHistory)}
                                    className="text-white hover:text-blue-100 font-bold text-sm underline"
                                >
                                    View History
                                </button>
                            </div>
                        </div>

                        {showSettings ? (
                            <div className="glass-dark rounded-3xl p-6">
                                <h2 className="text-3xl font-black text-white mb-6">Settings</h2>

                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-white font-bold mb-3 text-lg">
                                            Program Type
                                        </label>
                                        <div className="flex gap-4">
                                            <button
                                                onClick={() => setSetCount(3)}
                                                className={`flex-1 py-4 rounded-xl font-bold transition-all ${
                                                    setCount === 3
                                                        ? 'glass-button text-white shadow-2xl scale-105'
                                                        : 'glass-input text-blue-100 hover:scale-105'
                                                }`}
                                            >
                                                3 Sets (3x5)
                                            </button>
                                            <button
                                                onClick={() => setSetCount(5)}
                                                className={`flex-1 py-4 rounded-xl font-bold transition-all ${
                                                    setCount === 5
                                                        ? 'glass-button text-white shadow-2xl scale-105'
                                                        : 'glass-input text-blue-100 hover:scale-105'
                                                }`}
                                            >
                                                5 Sets (5x5)
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-white font-bold mb-3 text-lg">
                                            Auto-Fill Weights
                                        </label>
                                        <button
                                            onClick={() => setAutoFillWeights(!autoFillWeights)}
                                            className={`w-full py-4 rounded-xl font-bold transition-all ${
                                                autoFillWeights
                                                    ? 'glass-success text-white shadow-lg'
                                                    : 'glass-input text-blue-100 hover:scale-105'
                                            }`}
                                        >
                                            {autoFillWeights ? '✓ Enabled' : 'Disabled'}
                                        </button>
                                    </div>

                                    <div className="glass-input rounded-xl h-px my-6"></div>

                                    <div className="space-y-3">
                                        <button
                                            onClick={exportToCSV}
                                            disabled={workouts.length === 0}
                                            className="w-full glass-success disabled:opacity-50 text-white font-bold py-4 rounded-xl mb-3 shadow-lg"
                                        >
                                            Export Data (CSV)
                                        </button>
                                        <button
                                            onClick={() => {
                                                if (confirm('Reset all data and start fresh?')) {
                                                    localStorage.clear();
                                                    window.location.reload();
                                                }
                                            }}
                                            className="w-full glass-input hover:scale-105 text-white font-bold py-4 rounded-xl"
                                            style={{background: 'rgba(239, 68, 68, 0.3)', border: '1px solid rgba(239, 68, 68, 0.5)'}}
                                        >
                                            Reset All Data
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : showHistory ? (
                            <div className="glass-dark rounded-3xl p-6">
                                <h2 className="text-3xl font-black text-white mb-6">Workout History</h2>

                                {workouts.length === 0 ? (
                                    <div className="text-center text-blue-100 py-12 font-medium text-lg">
                                        No workouts yet! Start your first workout.
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {workouts.slice().reverse().map((workout, idx) => (
                                            <div key={idx} className="glass rounded-2xl p-5">
                                                <div className="flex justify-between mb-4 pb-4" style={{borderBottom: '1px solid rgba(255, 255, 255, 0.1)'}}>
                                                    <div>
                                                        <div className="text-xl font-black text-white">
                                                            Workout {workout.type}
                                                        </div>
                                                        <div className="text-sm text-blue-100 font-medium">
                                                            {new Date(workout.date).toLocaleDateString('en-US', {
                                                                weekday: 'long',
                                                                month: 'long',
                                                                day: 'numeric'
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="space-y-3">
                                                    {workout.exercises.map((ex, i) => (
                                                        <div key={i} className="glass-input rounded-xl p-4">
                                                            <div className="font-bold text-white mb-3 text-lg">
                                                                {ex.name}
                                                            </div>
                                                            <div className="flex gap-2 flex-wrap">
                                                                {ex.sets.map((set, setIdx) => (
                                                                    <div key={setIdx} className="glass-dark rounded-lg px-4 py-2 text-sm">
                                                                        <span className="text-white font-black">{set.weight}</span>
                                                                        <span className="text-blue-200"> lbs × </span>
                                                                        <span className="text-blue-200 font-bold">{set.reps}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div>
                                {/* Next Workout Card */}
                                <div className="glass-dark rounded-3xl p-6 mb-6">
                                    <h2 className="text-lg text-blue-200 mb-2 font-medium">Next Workout</h2>
                                    <h3 className="text-4xl font-black text-white mb-6">
                                        Workout {currentWorkout.type}
                                    </h3>

                                    <div className="space-y-3 mb-6">
                                        {currentWorkout.exercises.map((ex, i) => (
                                            <div key={i} className="flex justify-between items-center glass rounded-xl p-4">
                                                <span className="text-white font-bold text-lg">{ex.name}</span>
                                                <span className="text-blue-200 font-bold">{setCount} × {ex.target}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <button
                                        onClick={() => setShowWarmup(true)}
                                        className="w-full glass-button text-white font-black py-5 rounded-2xl text-xl shadow-2xl"
                                    >
                                        Start Workout 💪
                                    </button>
                                </div>

                                {/* Stats */}
                                {workouts.length > 0 && (
                                    <div className="glass-dark rounded-3xl p-6">
                                        <h3 className="text-2xl font-black text-white mb-6">Your Progress</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="glass rounded-2xl p-5 text-center">
                                                <div className="text-4xl font-black text-white mb-2">{workouts.length}</div>
                                                <div className="text-blue-200 text-sm font-medium">Total Workouts</div>
                                            </div>
                                            <div className="glass rounded-2xl p-5 text-center">
                                                <div className="text-4xl font-black text-white mb-2">
                                                    {Object.values(failureTracker).filter(f => f === 0).length}/{Object.keys(failureTracker).length}
                                                </div>
                                                <div className="text-blue-200 text-sm font-medium">On Track</div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<WorkoutTracker />, document.getElementById('root'));

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered:', reg.scope))
                    .catch(err => console.error('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
