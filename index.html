<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>3x5 Workout Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overscroll-behavior: none;
            touch-action: pan-x pan-y;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // SVG Icons
        const Calendar = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );

        const TrendingUp = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
        );

        const Dumbbell = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M14.4 14.4L9.6 9.6"></path>
                <path d="M18.657 21.485a2 2 0 1 1-2.829-2.828l-1.767 1.768a2 2 0 1 1-2.829-2.829l6.364-6.364a2 2 0 1 1 2.829 2.829l-1.768 1.767a2 2 0 1 1 2.828 2.829z"></path>
            </svg>
        );

        const Timer = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="14" r="8"></circle>
                <line x1="12" y1="14" x2="15" y2="11"></line>
            </svg>
        );

        const CheckCircle = ({ size = 24, className = "" }) => (
            <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );

        const Settings = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        );

        const ChevronRight = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        );

        function WorkoutTracker() {
            // Persistent state
            const [workouts, setWorkouts] = useState(() => {
                try {
                    const saved = localStorage.getItem('workoutHistory');
                    return saved ? JSON.parse(saved) : [];
                } catch {
                    return [];
                }
            });

            const [setCount, setSetCount] = useState(() => {
                const saved = localStorage.getItem('setCount');
                return saved ? parseInt(saved) : 3;
            });

            const [startingWeights, setStartingWeights] = useState(() => {
                try {
                    const saved = localStorage.getItem('startingWeights');
                    return saved ? JSON.parse(saved) : {};
                } catch {
                    return {};
                }
            });

            const [hasCompletedOnboarding, setHasCompletedOnboarding] = useState(() => {
                return localStorage.getItem('hasCompletedOnboarding') === 'true';
            });

            // Session state
            const [currentSession, setCurrentSession] = useState(null);
            const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
            const [sets, setSets] = useState(() =>
                Array(setCount).fill(null).map(() => ({ weight: '', reps: '' }))
            );

            // Warmup state
            const [warmupChecklist, setWarmupChecklist] = useState([
                { id: 1, text: '5 minutes light cardio', done: false },
                { id: 2, text: '10 arm circles each way', done: false },
                { id: 3, text: '10 bodyweight squats', done: false },
                { id: 4, text: '5 push-ups', done: false },
                { id: 5, text: '1 light warmup set', done: false }
            ]);

            // Timer state
            const [timerActive, setTimerActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(180); // 3 minutes default

            // UI state
            const [showHistory, setShowHistory] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [showWarmup, setShowWarmup] = useState(false);
            const [showOnboarding, setShowOnboarding] = useState(!hasCompletedOnboarding && workouts.length === 0);
            const [onboardingStep, setOnboardingStep] = useState(0);
            const [tempStartingWeights, setTempStartingWeights] = useState({});

            const [autoFillWeights, setAutoFillWeights] = useState(() => {
                const saved = localStorage.getItem('autoFillWeights');
                return saved === 'true';
            });

            const [failureTracker, setFailureTracker] = useState(() => {
                try {
                    const saved = localStorage.getItem('failureTracker');
                    return saved ? JSON.parse(saved) : {};
                } catch {
                    return {};
                }
            });

            // Workout templates
            const workoutA = [
                { name: 'Squat', target: 5, description: 'Barbell Back Squat or Goblet Squat' },
                { name: 'Bench Press', target: 5, description: 'Barbell or Dumbbell Bench Press' },
                { name: 'Barbell Row', target: 5, description: 'Bent Over Barbell Row' }
            ];

            const workoutB = [
                { name: 'Squat', target: 5, description: 'Barbell Back Squat or Goblet Squat' },
                { name: 'Overhead Press', target: 5, description: 'Barbell or Dumbbell Press' },
                { name: 'Deadlift', target: 5, description: 'Conventional Deadlift' }
            ];

            const allExercises = [
                ...new Set([...workoutA, ...workoutB].map(e => e.name))
            ].map(name => {
                const ex = [...workoutA, ...workoutB].find(e => e.name === name);
                return { ...ex };
            });

            // Persist data
            useEffect(() => {
                localStorage.setItem('workoutHistory', JSON.stringify(workouts));
            }, [workouts]);

            useEffect(() => {
                localStorage.setItem('setCount', setCount.toString());
                setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
            }, [setCount]);

            useEffect(() => {
                localStorage.setItem('autoFillWeights', autoFillWeights.toString());
            }, [autoFillWeights]);

            useEffect(() => {
                localStorage.setItem('failureTracker', JSON.stringify(failureTracker));
            }, [failureTracker]);

            useEffect(() => {
                localStorage.setItem('startingWeights', JSON.stringify(startingWeights));
            }, [startingWeights]);

            // Timer
            useEffect(() => {
                let interval;
                if (timerActive && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(time => time - 1);
                    }, 1000);
                } else if (timeLeft === 0) {
                    setTimerActive(false);
                    // Play notification sound or vibrate
                    if (navigator.vibrate) {
                        navigator.vibrate([200, 100, 200]);
                    }
                }
                return () => clearInterval(interval);
            }, [timerActive, timeLeft]);

            const startTimer = () => {
                setTimeLeft(180);
                setTimerActive(true);
            };

            const stopTimer = () => {
                setTimerActive(false);
                setTimeLeft(180);
            };

            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // Onboarding functions
            const completeOnboarding = () => {
                setStartingWeights(tempStartingWeights);
                setHasCompletedOnboarding(true);
                localStorage.setItem('hasCompletedOnboarding', 'true');
                setShowOnboarding(false);
                setShowWarmup(true);
            };

            // Workout logic
            const getCurrentWorkout = () => {
                if (workouts.length === 0) return { type: 'A', exercises: workoutA };
                const lastWorkout = workouts[workouts.length - 1];
                return lastWorkout.type === 'A'
                    ? { type: 'B', exercises: workoutB }
                    : { type: 'A', exercises: workoutA };
            };

            const getSuggestedWeight = (exerciseName) => {
                const lastSession = workouts
                    .filter(w => w.exercises.some(e => e.name === exerciseName))
                    .pop();

                if (!lastSession) {
                    return startingWeights[exerciseName] || 'Set starting weight';
                }

                const exercise = lastSession.exercises.find(e => e.name === exerciseName);
                if (!exercise) return startingWeights[exerciseName] || 'Set starting weight';

                const failures = failureTracker[exerciseName] || 0;
                const lastWeight = parseInt(exercise.sets[0]?.weight) || 0;

                if (failures >= 3) {
                    const deloadWeight = Math.round(lastWeight * 0.9);
                    return `${deloadWeight} lbs (DELOAD -10%)`;
                }

                const allSetsComplete = exercise.sets.every(s =>
                    parseInt(s.reps) >= 5
                );

                if (allSetsComplete) {
                    return `${lastWeight + 5} lbs (up 5!)`;
                } else {
                    return `${lastWeight} lbs (same)`;
                }
            };

            const hasCompletedWorkoutToday = () => {
                if (workouts.length === 0) return false;

                const lastWorkout = workouts[workouts.length - 1];
                const lastWorkoutDate = new Date(lastWorkout.date);
                const today = new Date();

                return (
                    lastWorkoutDate.getDate() === today.getDate() &&
                    lastWorkoutDate.getMonth() === today.getMonth() &&
                    lastWorkoutDate.getFullYear() === today.getFullYear()
                );
            };

            const completeExercise = () => {
                const filledSets = sets.filter(s => s.weight && s.reps);
                const exerciseData = {
                    name: currentExercise.name,
                    sets: filledSets
                };

                const allSetsComplete = filledSets.length === setCount &&
                    filledSets.every(s => parseInt(s.reps) >= currentExercise.target);

                const newFailureTracker = { ...failureTracker };
                if (allSetsComplete) {
                    newFailureTracker[currentExercise.name] = 0;
                } else {
                    newFailureTracker[currentExercise.name] = (newFailureTracker[currentExercise.name] || 0) + 1;
                }
                setFailureTracker(newFailureTracker);

                const baseSession = currentSession || {
                    date: new Date().toISOString(),
                    type: currentWorkout.type,
                    exercises: []
                };

                const updatedSession = {
                    ...baseSession,
                    exercises: [...baseSession.exercises, exerciseData]
                };

                if (currentExerciseIndex < currentWorkout.exercises.length - 1) {
                    setCurrentSession(updatedSession);
                    setCurrentExerciseIndex(currentExerciseIndex + 1);
                    setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                    startTimer();
                } else {
                    setWorkouts(prev => [...prev, updatedSession]);
                    setCurrentSession(null);
                    setCurrentExerciseIndex(0);
                    setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                    setShowWarmup(false);
                    setWarmupChecklist(items => items.map(item => ({ ...item, done: false })));
                }
            };

            const finishWarmup = () => {
                const selectedWorkout = getCurrentWorkout();
                setCurrentSession({
                    date: new Date().toISOString(),
                    type: selectedWorkout.type,
                    exercises: []
                });
                setCurrentExerciseIndex(0);
                setSets(Array(setCount).fill(null).map(() => ({ weight: '', reps: '' })));
                setShowWarmup(false);
            };

            const toggleWarmupItem = (id) => {
                setWarmupChecklist(prev => prev.map(item =>
                    item.id === id ? { ...item, done: !item.done } : item
                ));
            };

            const handleSetChange = (index, field, value) => {
                setSets(prev => prev.map((s, i) => (
                    i === index ? { ...s, [field]: value } : s
                )));
            };

            const exportToCSV = () => {
                const headers = ['Date', 'Workout Type', 'Exercise', 'Set Number', 'Weight (lbs)', 'Reps'];
                const rows = [headers];

                workouts.forEach(workout => {
                    const date = new Date(workout.date).toLocaleDateString('en-US');
                    workout.exercises.forEach(exercise => {
                        exercise.sets.forEach((set, setIdx) => {
                            rows.push([
                                date,
                                workout.type,
                                exercise.name,
                                setIdx + 1,
                                set.weight,
                                set.reps
                            ]);
                        });
                    });
                });

                const csvContent = rows.map(row => row.join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `workout-history-${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                URL.revokeObjectURL(url);
            };

            const currentWorkout = currentSession
                ? {
                    type: currentSession.type,
                    exercises: currentSession.type === 'A' ? workoutA : workoutB
                  }
                : getCurrentWorkout();
            const currentExercise = currentWorkout.exercises[currentExerciseIndex];

            // Auto-fill weights
            useEffect(() => {
                if (autoFillWeights && currentExercise) {
                    const suggestion = getSuggestedWeight(currentExercise.name);
                    const weightMatch = suggestion.match(/^\d+/);
                    if (weightMatch) {
                        setSets(Array(setCount).fill(null).map(() => ({
                            weight: weightMatch[0],
                            reps: currentExercise.target.toString()
                        })));
                    }
                }
            }, [currentExerciseIndex, autoFillWeights, currentExercise?.name, setCount]);

            // ONBOARDING SCREEN
            if (showOnboarding) {
                if (onboardingStep === 0) {
                    return (
                        <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4 flex items-center justify-center">
                            <div className="max-w-md w-full">
                                <div className="bg-slate-800 rounded-lg p-8 border border-slate-700">
                                    <div className="text-center mb-8">
                                        <div className="inline-flex items-center justify-center w-20 h-20 bg-blue-500 rounded-full mb-4">
                                            <Dumbbell size={48} />
                                        </div>
                                        <h1 className="text-4xl font-bold text-white mb-2">
                                            Welcome to 3x5
                                        </h1>
                                        <p className="text-slate-400 text-lg">
                                            Your strength training companion
                                        </p>
                                    </div>

                                    <div className="space-y-4 mb-8">
                                        <div className="flex items-start gap-3">
                                            <div className="flex-shrink-0 w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white font-bold">
                                                1
                                            </div>
                                            <div>
                                                <h3 className="text-white font-semibold">Progressive Overload</h3>
                                                <p className="text-slate-400 text-sm">Add 5 lbs each successful workout</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-3">
                                            <div className="flex-shrink-0 w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white font-bold">
                                                2
                                            </div>
                                            <div>
                                                <h3 className="text-white font-semibold">A/B Split Workouts</h3>
                                                <p className="text-slate-400 text-sm">Alternate between two full-body routines</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-3">
                                            <div className="flex-shrink-0 w-8 h-8 bg-green-500 rounded-full flex items-center justify-center text-white font-bold">
                                                3
                                            </div>
                                            <div>
                                                <h3 className="text-white font-semibold">Track Everything</h3>
                                                <p className="text-slate-400 text-sm">Log weights, reps, and view progress</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-700 rounded-lg p-4 mb-6">
                                        <label className="block text-white font-semibold mb-3">
                                            Choose Your Program
                                        </label>
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => setSetCount(3)}
                                                className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${
                                                    setCount === 3
                                                        ? 'bg-blue-500 text-white'
                                                        : 'bg-slate-600 text-slate-300 hover:bg-slate-500'
                                                }`}
                                            >
                                                3x5
                                                <div className="text-xs opacity-75">3 sets × 5 reps</div>
                                            </button>
                                            <button
                                                onClick={() => setSetCount(5)}
                                                className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${
                                                    setCount === 5
                                                        ? 'bg-blue-500 text-white'
                                                        : 'bg-slate-600 text-slate-300 hover:bg-slate-500'
                                                }`}
                                            >
                                                5x5
                                                <div className="text-xs opacity-75">5 sets × 5 reps</div>
                                            </button>
                                        </div>
                                    </div>

                                    <button
                                        onClick={() => setOnboardingStep(1)}
                                        className="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-lg transition-colors flex items-center justify-center gap-2"
                                    >
                                        Set Starting Weights
                                        <ChevronRight size={20} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    );
                } else {
                    // Step 1: Set starting weights
                    return (
                        <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4">
                            <div className="max-w-md mx-auto">
                                <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                    <h2 className="text-2xl font-bold text-white mb-2">
                                        Set Your Starting Weights
                                    </h2>
                                    <p className="text-slate-400 mb-6">
                                        Start conservative. You'll progress 5 lbs per workout.
                                    </p>

                                    <div className="space-y-4 mb-6">
                                        {allExercises.map(ex => (
                                            <div key={ex.name} className="bg-slate-700 rounded-lg p-4">
                                                <label className="block text-white font-semibold mb-1">
                                                    {ex.name}
                                                </label>
                                                <p className="text-slate-400 text-sm mb-3">{ex.description}</p>
                                                <div className="flex items-center gap-3">
                                                    <input
                                                        type="number"
                                                        inputMode="numeric"
                                                        value={tempStartingWeights[ex.name] || ''}
                                                        onChange={(e) => setTempStartingWeights(prev => ({
                                                            ...prev,
                                                            [ex.name]: e.target.value
                                                        }))}
                                                        className="flex-1 bg-slate-600 text-white text-lg rounded px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                        placeholder="0"
                                                    />
                                                    <span className="text-slate-300 font-semibold">lbs</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-blue-900/30 border border-blue-500 rounded-lg p-4 mb-6">
                                        <p className="text-blue-300 text-sm">
                                            💡 <strong>Tip:</strong> If you're new to lifting, start with the bar (45 lbs) for Squat/Bench/Deadlift and 20-25 lbs for Overhead Press and Rows.
                                        </p>
                                    </div>

                                    <div className="flex gap-3">
                                        <button
                                            onClick={() => setOnboardingStep(0)}
                                            className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-lg transition-colors"
                                        >
                                            Back
                                        </button>
                                        <button
                                            onClick={completeOnboarding}
                                            disabled={Object.keys(tempStartingWeights).length === 0}
                                            className="flex-1 bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 text-white font-bold py-3 rounded-lg transition-colors"
                                        >
                                            Start Training
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                }
            }

            // WARMUP SCREEN
            if (showWarmup) {
                const allWarmupDone = warmupChecklist.every(item => item.done);

                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4">
                        <div className="max-w-2xl mx-auto">
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <div className="flex items-center justify-between mb-6">
                                    <h1 className="text-3xl font-bold text-white flex items-center gap-2">
                                        <Dumbbell />
                                        Warmup
                                    </h1>
                                    <div className="text-right">
                                        <div className="text-sm text-slate-400">Next Up</div>
                                        <div className="text-xl font-bold text-blue-400">
                                            Workout {currentWorkout.type}
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-3 mb-6">
                                    {warmupChecklist.map(item => (
                                        <div
                                            key={item.id}
                                            onClick={() => toggleWarmupItem(item.id)}
                                            className={`p-4 rounded-lg cursor-pointer transition-all ${
                                                item.done
                                                    ? 'bg-green-900/30 border-2 border-green-500'
                                                    : 'bg-slate-700 border-2 border-slate-600'
                                            }`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <CheckCircle
                                                    className={item.done ? 'text-green-400' : 'text-slate-500'}
                                                    size={24}
                                                />
                                                <span className={`${item.done ? 'text-green-300 line-through' : 'text-white'}`}>
                                                    {item.text}
                                                </span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button
                                    onClick={finishWarmup}
                                    disabled={!allWarmupDone}
                                    className="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-bold py-4 rounded-lg transition-colors"
                                >
                                    {allWarmupDone ? 'Start Workout' : 'Complete warmup first'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // COMPLETION SCREEN
            if (hasCompletedWorkoutToday() && !showHistory && !showSettings && !currentSession) {
                const lastWorkout = workouts[workouts.length - 1];

                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4 flex items-center justify-center">
                        <div className="max-w-2xl w-full">
                            <div className="bg-slate-800 rounded-lg p-8 border border-slate-700 text-center">
                                <div className="mb-6">
                                    <div className="inline-flex items-center justify-center w-20 h-20 bg-green-500 rounded-full mb-4">
                                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3">
                                            <polyline points="20 6 9 17 4 12"></polyline>
                                        </svg>
                                    </div>
                                    <h1 className="text-4xl font-bold text-white mb-2">
                                        Workout Complete!
                                    </h1>
                                    <p className="text-slate-400 text-lg">
                                        You finished Workout {lastWorkout.type} today
                                    </p>
                                </div>

                                <div className="bg-slate-700 rounded-lg p-6 mb-6">
                                    <h3 className="text-white font-semibold mb-4">Today's Summary</h3>
                                    <div className="space-y-2">
                                        {lastWorkout.exercises.map((ex, i) => (
                                            <div key={i} className="flex justify-between text-sm">
                                                <span className="text-slate-300">{ex.name}</span>
                                                <span className="text-blue-400 font-semibold">
                                                    {ex.sets[0].weight} lbs × {ex.sets.length} sets
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row gap-3">
                                    <button
                                        onClick={() => setShowHistory(true)}
                                        className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 rounded-lg transition-colors"
                                    >
                                        View History
                                    </button>
                                    <button
                                        onClick={exportToCSV}
                                        className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition-colors"
                                    >
                                        Export Data
                                    </button>
                                </div>

                                <button
                                    onClick={() => {
                                        if (confirm('Are you sure you want to do another workout today?')) {
                                            setShowWarmup(true);
                                        }
                                    }}
                                    className="w-full mt-3 text-slate-400 hover:text-slate-300 text-sm underline"
                                >
                                    Do another workout anyway
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // MAIN WORKOUT SCREEN
            if (currentSession) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4">
                        <div className="max-w-2xl mx-auto">
                            {/* Header */}
                            <div className="bg-slate-800 rounded-lg p-4 mb-4 border border-slate-700">
                                <div className="flex items-center justify-between">
                                    <div>
                                        <div className="text-slate-400 text-sm">Workout {currentWorkout.type}</div>
                                        <div className="text-white text-xl font-bold">
                                            {currentExercise.name}
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-slate-400 text-sm">Exercise</div>
                                        <div className="text-blue-400 text-xl font-bold">
                                            {currentExerciseIndex + 1}/{currentWorkout.exercises.length}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Suggested Weight */}
                            <div className="bg-slate-800 rounded-lg p-4 mb-4 border border-slate-700">
                                <div className="flex items-center gap-2 mb-2">
                                    <TrendingUp size={20} />
                                    <span className="text-white font-semibold">Suggested Weight</span>
                                </div>
                                <div className="text-2xl font-bold text-green-400">
                                    {getSuggestedWeight(currentExercise.name)}
                                </div>
                            </div>

                            {/* Deload Warning */}
                            {failureTracker[currentExercise.name] >= 3 && (
                                <div className="bg-orange-600 rounded-lg p-4 mb-4 border border-orange-500">
                                    <div className="flex items-center gap-2 mb-1">
                                        <span className="text-white font-bold">⚠️ Deload Time!</span>
                                    </div>
                                    <p className="text-orange-100 text-sm">
                                        Failed 3 times. Reduce weight by 10% and rebuild.
                                    </p>
                                </div>
                            )}

                            {/* Rest Timer */}
                            <div className="bg-slate-800 rounded-lg p-4 mb-4 border border-slate-700">
                                <div className="flex items-center justify-between mb-3">
                                    <div className="flex items-center gap-2">
                                        <Timer size={20} />
                                        <span className="text-white font-semibold">Rest Timer</span>
                                    </div>
                                    <div className={`text-3xl font-bold ${timeLeft <= 10 && timerActive ? 'text-red-400' : 'text-blue-400'}`}>
                                        {formatTime(timeLeft)}
                                    </div>
                                </div>
                                <div className="flex gap-2">
                                    <button
                                        onClick={startTimer}
                                        disabled={timerActive}
                                        className="flex-1 bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 text-white font-semibold py-2 rounded-lg"
                                    >
                                        Start
                                    </button>
                                    <button
                                        onClick={stopTimer}
                                        className="flex-1 bg-red-500 hover:bg-red-600 text-white font-semibold py-2 rounded-lg"
                                    >
                                        Reset
                                    </button>
                                </div>
                            </div>

                            {/* Sets */}
                            <div className="space-y-3 mb-4">
                                {sets.map((set, index) => (
                                    <div key={index} className="bg-slate-800 rounded-lg p-4 border border-slate-700">
                                        <div className="text-white font-semibold mb-3">
                                            Set {index + 1}
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-slate-300 text-sm mb-2">
                                                    Weight (lbs)
                                                </label>
                                                <input
                                                    type="number"
                                                    inputMode="numeric"
                                                    value={set.weight}
                                                    onChange={(e) => handleSetChange(index, 'weight', e.target.value)}
                                                    className="w-full bg-slate-700 text-white text-lg rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                    placeholder="0"
                                                />
                                            </div>
                                            <div>
                                                <label className="block text-slate-300 text-sm mb-2">
                                                    Reps
                                                </label>
                                                <input
                                                    type="number"
                                                    inputMode="numeric"
                                                    value={set.reps}
                                                    onChange={(e) => handleSetChange(index, 'reps', e.target.value)}
                                                    className="w-full bg-slate-700 text-white text-lg rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                                    placeholder="5"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <button
                                onClick={completeExercise}
                                disabled={!sets.some(s => s.weight && s.reps)}
                                className="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 text-white font-bold py-4 rounded-lg text-lg"
                            >
                                {currentExerciseIndex < currentWorkout.exercises.length - 1
                                    ? 'Next Exercise →'
                                    : 'Complete Workout ✓'}
                            </button>
                        </div>
                    </div>
                );
            }

            // HOME/DASHBOARD SCREEN
            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 p-4">
                    <div className="max-w-2xl mx-auto">
                        {/* Header */}
                        <div className="bg-slate-800 rounded-lg p-6 mb-6 border border-slate-700">
                            <div className="flex items-center justify-between mb-4">
                                <h1 className="text-3xl font-bold text-white flex items-center gap-2">
                                    <Dumbbell />
                                    3x5 Tracker
                                </h1>
                                <button
                                    onClick={() => setShowSettings(!showSettings)}
                                    className="text-slate-400 hover:text-slate-300"
                                >
                                    <Settings size={24} />
                                </button>
                            </div>
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2 text-slate-300">
                                    <Calendar size={16} />
                                    <span>{new Date().toLocaleDateString('en-US', {
                                        weekday: 'long',
                                        month: 'long',
                                        day: 'numeric'
                                    })}</span>
                                </div>
                                <button
                                    onClick={() => setShowHistory(!showHistory)}
                                    className="text-blue-400 hover:text-blue-300 font-semibold text-sm underline"
                                >
                                    View History
                                </button>
                            </div>
                        </div>

                        {showSettings ? (
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <h2 className="text-2xl font-bold text-white mb-6">Settings</h2>

                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-white font-semibold mb-3">
                                            Program Type
                                        </label>
                                        <div className="flex gap-4">
                                            <button
                                                onClick={() => setSetCount(3)}
                                                className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${
                                                    setCount === 3
                                                        ? 'bg-blue-500 text-white'
                                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                                }`}
                                            >
                                                3 Sets (3x5)
                                            </button>
                                            <button
                                                onClick={() => setSetCount(5)}
                                                className={`flex-1 py-3 rounded-lg font-semibold transition-colors ${
                                                    setCount === 5
                                                        ? 'bg-blue-500 text-white'
                                                        : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                                }`}
                                            >
                                                5 Sets (5x5)
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-white font-semibold mb-3">
                                            Auto-Fill Weights
                                        </label>
                                        <button
                                            onClick={() => setAutoFillWeights(!autoFillWeights)}
                                            className={`w-full py-3 rounded-lg font-semibold transition-colors ${
                                                autoFillWeights
                                                    ? 'bg-green-600 text-white'
                                                    : 'bg-slate-700 text-slate-300 hover:bg-slate-600'
                                            }`}
                                        >
                                            {autoFillWeights ? '✓ Enabled' : 'Disabled'}
                                        </button>
                                    </div>

                                    <div className="border-t border-slate-700 pt-6">
                                        <button
                                            onClick={exportToCSV}
                                            disabled={workouts.length === 0}
                                            className="w-full bg-green-600 hover:bg-green-700 disabled:bg-slate-600 text-white font-semibold py-3 rounded-lg mb-3"
                                        >
                                            Export Data (CSV)
                                        </button>
                                        <button
                                            onClick={() => {
                                                if (confirm('Reset all data and start fresh?')) {
                                                    localStorage.clear();
                                                    window.location.reload();
                                                }
                                            }}
                                            className="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg"
                                        >
                                            Reset All Data
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : showHistory ? (
                            <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                <h2 className="text-2xl font-bold text-white mb-6">Workout History</h2>

                                {workouts.length === 0 ? (
                                    <div className="text-center text-slate-400 py-8">
                                        No workouts yet! Start your first workout.
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {workouts.slice().reverse().map((workout, idx) => (
                                            <div key={idx} className="bg-slate-700 rounded-lg p-4">
                                                <div className="flex justify-between mb-3 pb-3 border-b border-slate-600">
                                                    <div>
                                                        <div className="text-lg font-bold text-white">
                                                            Workout {workout.type}
                                                        </div>
                                                        <div className="text-sm text-slate-400">
                                                            {new Date(workout.date).toLocaleDateString('en-US', {
                                                                weekday: 'long',
                                                                month: 'long',
                                                                day: 'numeric'
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="space-y-3">
                                                    {workout.exercises.map((ex, i) => (
                                                        <div key={i} className="bg-slate-600 rounded p-3">
                                                            <div className="font-semibold text-white mb-2">
                                                                {ex.name}
                                                            </div>
                                                            <div className="flex gap-2 flex-wrap">
                                                                {ex.sets.map((set, setIdx) => (
                                                                    <div key={setIdx} className="bg-slate-700 rounded px-3 py-1 text-sm">
                                                                        <span className="text-white font-bold">{set.weight}</span>
                                                                        <span className="text-slate-400"> lbs × </span>
                                                                        <span className="text-blue-400 font-semibold">{set.reps}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div>
                                {/* Next Workout Card */}
                                <div className="bg-slate-800 rounded-lg p-6 mb-6 border border-slate-700">
                                    <h2 className="text-lg text-slate-400 mb-2">Next Workout</h2>
                                    <h3 className="text-3xl font-bold text-white mb-4">
                                        Workout {currentWorkout.type}
                                    </h3>

                                    <div className="space-y-3 mb-6">
                                        {currentWorkout.exercises.map((ex, i) => (
                                            <div key={i} className="flex justify-between items-center">
                                                <span className="text-white font-semibold">{ex.name}</span>
                                                <span className="text-slate-400">{setCount} × {ex.target}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <button
                                        onClick={() => setShowWarmup(true)}
                                        className="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 rounded-lg text-lg"
                                    >
                                        Start Workout
                                    </button>
                                </div>

                                {/* Stats */}
                                {workouts.length > 0 && (
                                    <div className="bg-slate-800 rounded-lg p-6 border border-slate-700">
                                        <h3 className="text-lg font-semibold text-white mb-4">Your Progress</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-slate-700 rounded-lg p-4 text-center">
                                                <div className="text-2xl font-bold text-blue-400">{workouts.length}</div>
                                                <div className="text-slate-400 text-sm">Total Workouts</div>
                                            </div>
                                            <div className="bg-slate-700 rounded-lg p-4 text-center">
                                                <div className="text-2xl font-bold text-green-400">
                                                    {Object.values(failureTracker).filter(f => f === 0).length}/{Object.keys(failureTracker).length}
                                                </div>
                                                <div className="text-slate-400 text-sm">On Track</div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<WorkoutTracker />, document.getElementById('root'));

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed'));
            });
        }
    </script>
</body>
</html>
