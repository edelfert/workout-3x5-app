<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Icon Generator - 3x5 Workout Tracker</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .preview {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .icon-preview {
            text-align: center;
        }
        canvas {
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .success {
            background: #10b981;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏋️ Icon Generator</h1>
        <p>Generate icons for your 3x5 Workout Tracker PWA</p>

        <button onclick="generateIcons()">Generate Icons</button>

        <div class="preview" id="preview"></div>

        <div class="success" id="success">
            ✅ Icons generated! Click each icon to download.
        </div>
    </div>

    <script>
        function generateIcons() {
            const sizes = [192, 512];
            const preview = document.getElementById('preview');
            preview.innerHTML = '';

            sizes.forEach(size => {
                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Draw gradient background
                const gradient = ctx.createLinearGradient(0, 0, size, size);
                gradient.addColorStop(0, '#667eea');
                gradient.addColorStop(1, '#764ba2');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, size, size);

                // Draw dumbbell icon
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'white';
                ctx.lineWidth = size * 0.08;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const centerX = size / 2;
                const centerY = size / 2;
                const scale = size / 100;

                // Draw dumbbell
                // Left weight
                ctx.fillRect(centerX - 40*scale, centerY - 12*scale, 15*scale, 24*scale);
                ctx.fillRect(centerX - 42*scale, centerY - 8*scale, 4*scale, 16*scale);

                // Right weight
                ctx.fillRect(centerX + 25*scale, centerY - 12*scale, 15*scale, 24*scale);
                ctx.fillRect(centerX + 38*scale, centerY - 8*scale, 4*scale, 16*scale);

                // Bar
                ctx.fillRect(centerX - 25*scale, centerY - 3*scale, 50*scale, 6*scale);

                // Add "3x5" text
                ctx.font = `bold ${size * 0.18}px Inter, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = 'white';
                ctx.fillText('3×5', centerX, centerY + 30*scale);

                // Create preview
                const previewDiv = document.createElement('div');
                previewDiv.className = 'icon-preview';

                const previewCanvas = document.createElement('canvas');
                previewCanvas.width = 150;
                previewCanvas.height = 150;
                const previewCtx = previewCanvas.getContext('2d');
                previewCtx.drawImage(canvas, 0, 0, size, size, 0, 0, 150, 150);

                const label = document.createElement('div');
                label.textContent = `${size}×${size}`;
                label.style.fontWeight = 'bold';
                label.style.color = '#667eea';

                const downloadBtn = document.createElement('button');
                downloadBtn.textContent = 'Download';
                downloadBtn.onclick = () => {
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `icon-${size}.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                    });
                };

                previewDiv.appendChild(previewCanvas);
                previewDiv.appendChild(label);
                previewDiv.appendChild(downloadBtn);
                preview.appendChild(previewDiv);
            });

            document.getElementById('success').style.display = 'block';
        }

        // Auto-generate on load
        window.onload = () => {
            generateIcons();
        };
    </script>
</body>
</html>
